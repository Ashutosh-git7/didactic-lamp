<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TMPL PRO Ecosystem</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;font-family:Poppins}
body{
margin:0;
background:#020617;
color:#fff;
}

.hidden{display:none}

.header{
background:linear-gradient(90deg,#06b6d4,#22c55e);
padding:15px;
text-align:center;
font-size:22px;
font-weight:600;
}

.container{padding:15px;max-width:700px;margin:auto}

.card{
background:rgba(15,23,42,.9);
padding:15px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,.5);
backdrop-filter:blur(10px);
}

input,button{
width:100%;
padding:12px;
margin:6px 0;
border-radius:8px;
border:none;
font-size:14px;
}

input{
background:#020617;
color:#fff;
}

button{
background:linear-gradient(90deg,#22c55e,#06b6d4);
color:#fff;
font-weight:600;
cursor:pointer;
}

.balance{
font-size:28px;
text-align:center;
color:#22c55e;
font-weight:600;
}

.small{opacity:.7;font-size:13px}

.linkbox{
background:#020617;
padding:10px;
border-radius:8px;
word-break:break-all;
}
</style>
</head>

<body>

<div class="header">🪙 TMPL PRO Ecosystem</div>

<div class="container">

<!-- AUTH PAGE -->
<div id="authPage">

<div class="card">
<h3>Create Account</h3>
<input id="rname" placeholder="Full Name">
<input id="rmobile" placeholder="Mobile Number">
<input id="rpassword" type="password" placeholder="Password">
<input id="rwallet" placeholder="BEP20 USDT Wallet">
<input id="rref" placeholder="Referral Code (auto)">
<button onclick="register()">Register</button>
</div>

<div class="card">
<h3>Login</h3>
<input id="lmobile" placeholder="Mobile Number">
<input id="lpassword" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

</div>

<!-- DASHBOARD PAGE -->
<div id="dashboardPage" class="hidden">

<div class="card">
<h3>Account</h3>
<div id="userinfo"></div>
</div>

<div class="card">
<div class="balance" id="balance">0 TMPL</div>
<div class="small">TMPL Balance</div>
<hr>
Investment: <span id="investment">0</span> USDT<br>
Referral Earnings: <span id="refincome">0</span> TMPL<br>
Team Size: <span id="teamsize">0</span><br>
Live Price: <span id="liveprice">0</span> USDT<br>
Liquidity Pool: <span id="liquidity">0</span> USDT
</div>

<div class="card">
<h3>Your Referral Link</h3>
<div id="reflink" class="linkbox"></div>
<button onclick="copyRef()">Copy Link</button>
</div>

<div class="card">
<h3>Invest</h3>
<input id="amount" placeholder="Minimum 20 USDT">
<button onclick="submitInvestment()">Submit Investment</button>
</div>

<div class="card">
<h3>Withdraw</h3>
<input id="withdrawAmount" placeholder="Min 5 USDT equivalent">
<button onclick="requestWithdraw()">Request Withdraw</button>
</div>

<button onclick="logout()">Logout</button>

</div>

<!-- ADMIN PAGE -->
<div id="adminPage" class="hidden">
<div class="card">
<h3>Admin Login</h3>
<input id="adminpass" type="password" placeholder="Admin Password">
<button onclick="adminLogin()">Enter Admin</button>
</div>

<div id="adminPanel"></div>
</div>

</div>

<script type="module">

/* ================= FIREBASE ================= */
/* EDITABLE CONFIG */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getDatabase,
ref,
set,
get,
update,
runTransaction,
child,
onValue
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_AUTH_DOMAIN",
databaseURL:"YOUR_DB_URL",
projectId:"YOUR_PROJECT_ID",
storageBucket:"YOUR_BUCKET",
messagingSenderId:"XXXX",
appId:"XXXX"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

/* ================= GLOBAL ================= */

let currentUser=null;
let currentData=null;

/* referral capture */
const urlParams=new URLSearchParams(window.location.search);
if(urlParams.get("ref")){
document.getElementById("rref").value=urlParams.get("ref");
}

/* ================= SESSION ================= */

function saveSession(id){
localStorage.setItem("tmplUser",id);
}

function loadSession(){
let id=localStorage.getItem("tmplUser");
if(id){
currentUser=id;
openDashboard();
}
}
loadSession();

/* ================= REGISTER ================= */

window.register=async()=>{
let name=rname.value.trim();
let mobile=rmobile.value.trim();
let pass=rpassword.value.trim();
let wallet=rwallet.value.trim();
let refcode=rref.value.trim();

if(!name||!mobile||!pass||!wallet)
return alert("All fields required");

let check=await get(ref(db,'users/'+mobile));
if(check.exists()) return alert("User exists");

let myRef=Math.random().toString(36).substring(2,6);

await set(ref(db,'users/'+mobile),{
name,
password:pass,
wallet,
ref:refcode||"",
myRef,
balance:0,
investment:0,
referralIncome:0,
team:0
});

alert("Registered Successfully");
};

/* ================= LOGIN ================= */

window.login=async()=>{
let mobile=lmobile.value.trim();
let pass=lpassword.value.trim();

let snap=await get(ref(db,'users/'+mobile));
if(!snap.exists()) return alert("User not found");

if(snap.val().password!==pass)
return alert("Wrong password");

currentUser=mobile;
saveSession(mobile);
openDashboard();
};

/* ================= ROUTING ================= */

function openDashboard(){
authPage.classList.add("hidden");
dashboardPage.classList.remove("hidden");
loadUser();
}

/* ================= LOAD USER ================= */

async function loadUser(){

let snap=await get(ref(db,'users/'+currentUser));
currentData=snap.val();

userinfo.innerHTML=
`Name: ${currentData.name}<br>
Wallet: ${currentData.wallet}`;

balance.innerText=currentData.balance+" TMPL";
investment.innerText=currentData.investment||0;
refincome.innerText=currentData.referralIncome||0;

let stats=await get(ref(db,'stats'));
if(stats.exists()){
let s=stats.val();
liveprice.innerText=s.livePrice||0;
liquidity.innerText=s.liquidity||0;
}

reflink.innerText=
location.origin+location.pathname+"?ref="+currentData.myRef;

}

/* ================= COPY LINK ================= */

window.copyRef=()=>{
navigator.clipboard.writeText(reflink.innerText);
alert("Referral link copied");
};

/* ================= INVEST REQUEST ================= */

window.submitInvestment=async()=>{
let amt=parseFloat(amount.value);
if(isNaN(amt)||amt<20) return alert("Minimum 20 USDT");

let id=Date.now();

await set(ref(db,'joins/'+id),{
user:currentUser,
amount:amt,
status:"pending",
time:id
});

alert("Investment Submitted");
};

/* ================= WITHDRAW REQUEST ================= */

window.requestWithdraw=async()=>{
let amt=parseFloat(withdrawAmount.value);
if(isNaN(amt)||amt<=0) return;

let id=Date.now();

await set(ref(db,'withdrawals/'+id),{
user:currentUser,
amount:amt,
status:"pending",
time:id
});

alert("Withdraw Request Sent");
};

/* ================= LOGOUT ================= */

window.logout=()=>{
localStorage.removeItem("tmplUser");
location.reload();
};

/* ================= ADMIN LOGIN ================= */

window.adminLogin=()=>{
if(adminpass.value!=="Jaihanuman@7")
return alert("Wrong Password");

loadAdminPanel();
};

/* ADMIN PANEL LOADER (logic added in Part 2) */
async function loadAdminPanel(){
adminPanel.innerHTML=`<div class="card">Admin Panel Loading...</div>`;
}
<!-- ========================= PART 2 : ADMIN + MLM ENGINE ========================= -->

/* =========================================================
   ADMIN PANEL FULL SYSTEM
========================================================= */

import {
ref,
get,
update,
remove,
runTransaction,
set
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* ---------- ROUTE CHECK (#admin) ---------- */
if(location.hash === "#admin"){
authPage.classList.add("hidden");
dashboardPage.classList.add("hidden");
adminPage.classList.remove("hidden");
}

/* =========================================================
   ADMIN PANEL UI
========================================================= */

async function loadAdminPanel(){

let statsSnap = await get(ref(db,'stats'));
let stats = statsSnap.exists()?statsSnap.val():{};

adminPanel.innerHTML = `
<div class="card">
<h3>Business Controls</h3>

Live Price:
<input id="newPrice" placeholder="Update TMPL Price">
<button onclick="updateLivePrice()">Update Price</button>

<hr>

Liquidity Pool: ${stats.liquidity||0} USDT<br>
Company Fund: ${stats.companyFund||0} USDT

</div>

<div class="card">
<h3>Pending Investments</h3>
<div id="joinList"></div>
</div>

<div class="card">
<h3>Withdraw Requests</h3>
<div id="withdrawList"></div>
</div>

<div class="card">
<h3>User Management</h3>
<div id="userList"></div>
</div>
`;

loadJoins();
loadWithdrawals();
loadUsers();
}

/* =========================================================
   UPDATE LIVE PRICE
========================================================= */

window.updateLivePrice = async ()=>{
let price=parseFloat(newPrice.value);
if(!price || price<=0) return alert("Invalid price");

await update(ref(db,'stats'),{
livePrice:price
});

alert("Price Updated ✅");
loadAdminPanel();
};

/* =========================================================
   LOAD USERS
========================================================= */

async function loadUsers(){

let snap=await get(ref(db,'users'));
let html="";

snap.forEach(u=>{
let d=u.val();

html+=`
<div class="card">
<b>${d.name}</b> (${u.key})<br>
Balance: ${d.balance||0} TMPL<br>
Investment: ${d.investment||0} USDT

<button onclick="editUserPrompt('${u.key}')">Edit</button>
<button onclick="deleteUser('${u.key}')">Delete</button>
</div>`;
});

userList.innerHTML=html;
}

/* =========================================================
   EDIT USER
========================================================= */

window.editUserPrompt = async(uid)=>{

let snap=await get(ref(db,'users/'+uid));
let d=snap.val();

let name=prompt("Name",d.name);
if(name===null) return;

let balance=parseFloat(prompt("Balance TMPL",d.balance||0));
let investment=parseFloat(prompt("Investment",d.investment||0));

await editUser(uid,{
name,
balance,
investment
});

alert("User Updated ✅");
loadAdminPanel();
};

async function editUser(userId,newData){
await update(ref(db,'users/'+userId),newData);
}

/* =========================================================
   DELETE USER
========================================================= */

window.deleteUser = async(uid)=>{
if(!confirm("Delete user permanently?")) return;

await remove(ref(db,'users/'+uid));

alert("User Deleted");
loadAdminPanel();
};

/* =========================================================
   LOAD JOIN REQUESTS
========================================================= */

async function loadJoins(){

let snap=await get(ref(db,'joins'));
let html="";

if(!snap.exists()){
joinList.innerHTML="No pending joins";
return;
}

snap.forEach(j=>{
let d=j.val();
if(d.status==="pending"){
html+=`
<div class="card">
User: ${d.user}<br>
Amount: ${d.amount} USDT
<button onclick="processJoin('${j.key}')">Approve</button>
</div>`;
}
});

joinList.innerHTML=html||"No pending joins";
}

/* =========================================================
   PROCESS JOIN (MAIN BUSINESS ENTRY)
========================================================= */

window.processJoin = async(joinId)=>{

let snap=await get(ref(db,'joins/'+joinId));
let join=snap.val();

if(!join || join.status!=="pending") return;

await splitInvestment(join.user,join.amount);

await update(ref(db,'joins/'+joinId),{
status:"approved"
});

alert("Investment Approved ✅");
loadAdminPanel();
};

/* =========================================================
   INVESTMENT SPLIT
========================================================= */

async function splitInvestment(userId,amount){

let liquidity = amount*0.5;
let commission = amount*0.3;
let company = amount*0.2;

/* liquidity */
await runTransaction(ref(db,'stats/liquidity'),v=>(v||0)+liquidity);

/* company fund */
await runTransaction(ref(db,'stats/companyFund'),v=>(v||0)+company);

/* user investment */
await runTransaction(ref(db,'users/'+userId),(u)=>{
if(u){
u.investment=(u.investment||0)+amount;
}
return u;
});

/* MLM DISTRIBUTION */
await distributeCommission(userId,commission);
}

/* =========================================================
   MLM DISTRIBUTION (15 LEVEL)
========================================================= */

const levelPercents=[
0.10,0.05,0.03,0.02,0.02,
0.015,0.015,0.015,0.015,0.015,
0.01,0.01,0.01,0.01,0.01
];

async function calculateTMPL(usdt){

let snap=await get(ref(db,'stats/livePrice'));
let price=snap.exists()?snap.val():0.01;

return usdt/price;
}

async function distributeCommission(userId,commissionUSDT){

let userSnap=await get(ref(db,'users/'+userId));
let parent=userSnap.val().ref;

for(let i=0;i<15;i++){

if(!parent) break;

let percent=levelPercents[i];
let rewardUSDT=commissionUSDT*percent;
let rewardTMPL=await calculateTMPL(rewardUSDT);

await runTransaction(ref(db,'users/'+parent),(p)=>{
if(p){
p.balance=(p.balance||0)+rewardTMPL;
p.referralIncome=(p.referralIncome||0)+rewardTMPL;
parent=p.ref;
}
return p;
});

}
}

/* =========================================================
   WITHDRAW REQUESTS
========================================================= */

async function loadWithdrawals(){

let snap=await get(ref(db,'withdrawals'));
let html="";

if(!snap.exists()){
withdrawList.innerHTML="No withdrawals";
return;
}

snap.forEach(w=>{
let d=w.val();
if(d.status==="pending"){
html+=`
<div class="card">
User: ${d.user}<br>
Amount: ${d.amount}
<button onclick="approveWithdraw('${w.key}')">Approve</button>
</div>`;
}
});

withdrawList.innerHTML=html||"No withdrawals";
}

/* =========================================================
   APPROVE WITHDRAW
========================================================= */

window.approveWithdraw=async(id)=>{

let snap=await get(ref(db,'withdrawals/'+id));
let w=snap.val();

let priceSnap=await get(ref(db,'stats/livePrice'));
let price=priceSnap.val()||0.01;

let tmplNeeded=w.amount/price;

await runTransaction(ref(db,'users/'+w.user),(u)=>{
if(u && u.balance>=tmplNeeded){
u.balance-=tmplNeeded;
}
return u;
});

await update(ref(db,'withdrawals/'+id),{
status:"approved"
});

alert("Withdrawal Approved ✅");
loadAdminPanel();
};
<!-- ========================= PART 3 : ADVANCED FEATURES + LIQUIDITY REWARD + TEAM ========================= -->

/* =========================================================
   MONTHLY LIQUIDITY REWARD SYSTEM
   Admin Controlled Distribution
========================================================= */

window.addMonthlyLiquidityReward = async ()=>{

let percent = parseFloat(prompt("Enter Liquidity Reward %"));
if(!percent || percent<=0) return alert("Invalid percent");

let liqSnap = await get(ref(db,'stats/liquidity'));
let liquidity = liqSnap.val()||0;

let rewardUSDT = liquidity*(percent/100);

await addLiquidityLog(rewardUSDT);

let usersSnap = await get(ref(db,'users'));
let priceSnap = await get(ref(db,'stats/livePrice'));
let price = priceSnap.val()||0.01;

usersSnap.forEach(async(u)=>{

let d=u.val();

if((d.investment||0)>0){

let share = rewardUSDT*(d.investment/liquidity);
let tmplReward = share/price;

await runTransaction(ref(db,'users/'+u.key),(user)=>{
if(user){
user.balance=(user.balance||0)+tmplReward;
}
return user;
});

}

});

alert("Liquidity Reward Distributed ✅");
};

/* =========================================================
   ADD LIQUIDITY LOG
========================================================= */

async function addLiquidityLog(amount){

let id="liq_"+Date.now();

await set(ref(db,'liquidityLogs/'+id),{
amount,
time:Date.now()
});
}

/* =========================================================
   TEAM SIZE CALCULATION
========================================================= */

async function calculateTeamSize(uid){

let snap=await get(ref(db,'users'));
let count=0;

snap.forEach(u=>{
if(u.val().ref===uid) count++;
});

return count;
}

/* =========================================================
   REFERRAL LINK COPY
========================================================= */

window.copyReferral = ()=>{
let link = location.origin + location.pathname + "?ref="+currentUser;
navigator.clipboard.writeText(link);
alert("Referral Link Copied ✅");
};

/* =========================================================
   AUTO REFERRAL CAPTURE
========================================================= */

(function captureReferral(){
const params=new URLSearchParams(window.location.search);
const refCode=params.get("ref");
if(refCode){
localStorage.setItem("tmpl_ref",refCode);
}
})();

/* =========================================================
   SECURE REGISTRATION PATCH
========================================================= */

window.register = async ()=>{

let mobile=rmobile.value.trim();
let name=rname.value.trim();
let pass=rpassword.value.trim();
let wallet=rwallet.value.trim();

if(!mobile||!name||!pass||!wallet)
return alert("All fields required");

let exists=await get(ref(db,'users/'+mobile));
if(exists.exists()) return alert("User exists");

let refCode=localStorage.getItem("tmpl_ref")||"";

await set(ref(db,'users/'+mobile),{
name,
password:pass,
wallet,
ref:refCode,
balance:0,
investment:0,
referralIncome:0,
created:Date.now()
});

alert("Registration Successful ✅");
location.reload();
};

/* =========================================================
   DASHBOARD AUTO LOAD ENHANCEMENT
========================================================= */

async function refreshDashboard(){

if(!currentUser) return;

let snap=await get(ref(db,'users/'+currentUser));
if(!snap.exists()) return;

let d=snap.val();

let statsSnap=await get(ref(db,'stats'));
let stats=statsSnap.val()||{};

userinfo.innerHTML=`
<b>${d.name}</b><br>
Wallet: ${d.wallet}
`;

balance.innerHTML=(d.balance||0).toFixed(2)+" TMPL";
investment.innerText=d.investment||0;
refincome.innerText=(d.referralIncome||0).toFixed(2);

livePrice.innerText=stats.livePrice||0.01;
liquidityValue.innerText=stats.liquidity||0;

teamSize.innerText=await calculateTeamSize(currentUser);
}

/* refresh every 10 sec */
setInterval(refreshDashboard,10000);

/* =========================================================
   SESSION AUTO LOGIN
========================================================= */

(function autoLogin(){

let saved=localStorage.getItem("tmpl_session");

if(saved){
currentUser=saved;
authPage.classList.add("hidden");
dashboardPage.classList.remove("hidden");
refreshDashboard();
}

})();

/* =========================================================
   LOGOUT SAFE
========================================================= */

window.logout=()=>{
localStorage.removeItem("tmpl_session");
location.href=location.pathname;
};

</script>

</body>
</html>
