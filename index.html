<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TMPL PRO Ecosystem</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;font-family:Poppins}
body{
margin:0;
background:#020617;
color:#fff;
}

.hidden{display:none}

.header{
background:linear-gradient(90deg,#06b6d4,#22c55e);
padding:15px;
text-align:center;
font-size:22px;
font-weight:600;
}

.container{padding:15px;max-width:700px;margin:auto}

.card{
background:rgba(15,23,42,.9);
padding:15px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,.5);
backdrop-filter:blur(10px);
}

input,button{
width:100%;
padding:12px;
margin:6px 0;
border-radius:8px;
border:none;
font-size:14px;
}

input{
background:#020617;
color:#fff;
}

button{
background:linear-gradient(90deg,#22c55e,#06b6d4);
color:#fff;
font-weight:600;
cursor:pointer;
}

.balance{
font-size:28px;
text-align:center;
color:#22c55e;
font-weight:600;
}

.small{opacity:.7;font-size:13px}

.linkbox{
background:#020617;
padding:10px;
border-radius:8px;
word-break:break-all;
}
</style>
</head>

<body>

<div class="header">🪙 TMPL PRO Ecosystem</div>

<div class="container">

<!-- AUTH PAGE -->
<div id="authPage">

<div class="card">
<h3>Create Account</h3>
<input id="rname" placeholder="Full Name">
<input id="rmobile" placeholder="Mobile Number">
<input id="rpassword" type="password" placeholder="Password">
<input id="rwallet" placeholder="BEP20 USDT Wallet">
<input id="rref" placeholder="Referral Code (auto)">
<button onclick="register()">Register</button>
</div>

<div class="card">
<h3>Login</h3>
<input id="lmobile" placeholder="Mobile Number">
<input id="lpassword" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

</div>

<!-- DASHBOARD PAGE -->
<div id="dashboardPage" class="hidden">

<div class="card">
<h3>Account</h3>
<div id="userinfo"></div>
</div>

<div class="card">
<div class="balance" id="balance">0 TMPL</div>
<div class="small">TMPL Balance</div>
<hr>
Investment: <span id="investment">0</span> USDT<br>
Referral Earnings: <span id="refincome">0</span> TMPL<br>
Team Size: <span id="teamsize">0</span><br>
Live Price: <span id="liveprice">0</span> USDT<br>
Liquidity Pool: <span id="liquidity">0</span> USDT
</div>

<div class="card">
<h3>Your Referral Link</h3>
<div id="reflink" class="linkbox"></div>
<button onclick="copyRef()">Copy Link</button>
</div>

<div class="card">
<h3>Invest</h3>
<input id="amount" placeholder="Minimum 20 USDT">
<button onclick="submitInvestment()">Submit Investment</button>
</div>

<div class="card">
<h3>Withdraw</h3>
<input id="withdrawAmount" placeholder="Min 5 USDT equivalent">
<button onclick="requestWithdraw()">Request Withdraw</button>
</div>

<button onclick="logout()">Logout</button>

</div>

<!-- ADMIN PAGE -->
<div id="adminPage" class="hidden">
<div class="card">
<h3>Admin Login</h3>
<input id="adminpass" type="password" placeholder="Admin Password">
<button onclick="adminLogin()">Enter Admin</button>
</div>

<div id="adminPanel"></div>
</div>

</div>

<script type="module">

/* ================= FIREBASE ================= */
/* EDITABLE CONFIG */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getDatabase,
ref,
set,
get,
update,
runTransaction,
child,
onValue
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_AUTH_DOMAIN",
databaseURL:"YOUR_DB_URL",
projectId:"YOUR_PROJECT_ID",
storageBucket:"YOUR_BUCKET",
messagingSenderId:"XXXX",
appId:"XXXX"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

/* ================= GLOBAL ================= */

let currentUser=null;
let currentData=null;

/* referral capture */
const urlParams=new URLSearchParams(window.location.search);
if(urlParams.get("ref")){
document.getElementById("rref").value=urlParams.get("ref");
}

/* ================= SESSION ================= */

function saveSession(id){
localStorage.setItem("tmplUser",id);
}

function loadSession(){
let id=localStorage.getItem("tmplUser");
if(id){
currentUser=id;
openDashboard();
}
}
loadSession();

/* ================= REGISTER ================= */

window.register=async()=>{
let name=rname.value.trim();
let mobile=rmobile.value.trim();
let pass=rpassword.value.trim();
let wallet=rwallet.value.trim();
let refcode=rref.value.trim();

if(!name||!mobile||!pass||!wallet)
return alert("All fields required");

let check=await get(ref(db,'users/'+mobile));
if(check.exists()) return alert("User exists");

let myRef=Math.random().toString(36).substring(2,6);

await set(ref(db,'users/'+mobile),{
name,
password:pass,
wallet,
ref:refcode||"",
myRef,
balance:0,
investment:0,
referralIncome:0,
team:0
});

alert("Registered Successfully");
};

/* ================= LOGIN ================= */

window.login=async()=>{
let mobile=lmobile.value.trim();
let pass=lpassword.value.trim();

let snap=await get(ref(db,'users/'+mobile));
if(!snap.exists()) return alert("User not found");

if(snap.val().password!==pass)
return alert("Wrong password");

currentUser=mobile;
saveSession(mobile);
openDashboard();
};

/* ================= ROUTING ================= */

function openDashboard(){
authPage.classList.add("hidden");
dashboardPage.classList.remove("hidden");
loadUser();
}

/* ================= LOAD USER ================= */

async function loadUser(){

let snap=await get(ref(db,'users/'+currentUser));
currentData=snap.val();

userinfo.innerHTML=
`Name: ${currentData.name}<br>
Wallet: ${currentData.wallet}`;

balance.innerText=currentData.balance+" TMPL";
investment.innerText=currentData.investment||0;
refincome.innerText=currentData.referralIncome||0;

let stats=await get(ref(db,'stats'));
if(stats.exists()){
let s=stats.val();
liveprice.innerText=s.livePrice||0;
liquidity.innerText=s.liquidity||0;
}

reflink.innerText=
location.origin+location.pathname+"?ref="+currentData.myRef;

}

/* ================= COPY LINK ================= */

window.copyRef=()=>{
navigator.clipboard.writeText(reflink.innerText);
alert("Referral link copied");
};

/* ================= INVEST REQUEST ================= */

window.submitInvestment=async()=>{
let amt=parseFloat(amount.value);
if(isNaN(amt)||amt<20) return alert("Minimum 20 USDT");

let id=Date.now();

await set(ref(db,'joins/'+id),{
user:currentUser,
amount:amt,
status:"pending",
time:id
});

alert("Investment Submitted");
};

/* ================= WITHDRAW REQUEST ================= */

window.requestWithdraw=async()=>{
let amt=parseFloat(withdrawAmount.value);
if(isNaN(amt)||amt<=0) return;

let id=Date.now();

await set(ref(db,'withdrawals/'+id),{
user:currentUser,
amount:amt,
status:"pending",
time:id
});

alert("Withdraw Request Sent");
};

/* ================= LOGOUT ================= */

window.logout=()=>{
localStorage.removeItem("tmplUser");
location.reload();
};

/* ================= ADMIN LOGIN ================= */

window.adminLogin=()=>{
if(adminpass.value!=="Jaihanuman@7")
return alert("Wrong Password");

loadAdminPanel();
};

/* ADMIN PANEL LOADER (logic added in Part 2) */
async function loadAdminPanel(){
adminPanel.innerHTML=`<div class="card">Admin Panel Loading...</div>`;
}

</script>
</body>
</html>
