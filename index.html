<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMPL Ultimate Ecosystem</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#0b0f1a;color:#fff;min-height:100vh}
nav{display:flex;justify-content:space-between;align-items:center;padding:15px;background:rgba(255,255,255,0.05);backdrop-filter:blur(10px)}
nav a{color:#00e1ff;text-decoration:none;margin-left:10px}
.container{max-width:1100px;margin:auto;padding:20px}
.card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);padding:20px;border-radius:12px;margin-bottom:20px}
input,button{width:100%;padding:10px;margin:8px 0;border:none;border-radius:6px}
input{background:#111826;color:#fff}
button{background:linear-gradient(45deg,#00e1ff,#0077ff);color:#fff;font-weight:bold;cursor:pointer}

td,th{padding:8px;border-bottom:1px solid rgba(255,255,255,0.1);font-size:13px}
#map{height:300px;border-radius:10px}

</style>
</head>

<body>

<nav>
<div>TMPL ULTIMATE</div>
<div>
<a href="#">Home</a>
<a href="#login">Login</a>
<a href="#register">Register</a>
</div>
</nav>

<div class="container" id="app"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, update, remove, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyBZh-Wg8JK5x4kBCag8zxDXw-eVY_LZmUw",
authDomain: "tmpl-cd770.firebaseapp.com",
databaseURL: "https://tmpl-cd770-default-rtdb.firebaseio.com/",
projectId: "tmpl-cd770",
storageBucket: "tmpl-cd770.firebasestorage.app",
messagingSenderId: "383728687521",
appId: "1:383728687521:web:b3ac6cd7fde979cb8b13e0"
};

const app=initializeApp(firebaseConfig)
const db=getDatabase(app)

const walletRegex=/^0x[a-fA-F0-9]{40}$/

const routes={
"#":landing,
"#login":loginPage,
"#register":registerPage,
"#user":userDashboard,
"#admin":adminDashboard
}

window.addEventListener("hashchange",router)
router()

function router(){
(routes[location.hash||"#"]||landing)()
}

function landing(){
appDiv().innerHTML=`
<div class="card center">
<h2>TMPL Ultimate Web3 Platform</h2>
<p>Crypto investment with auto rewards & 15 level referrals</p>
<br>
<a href="#register"><button>Register</button></a>
<a href="#login"><button>Login</button></a>
</div>`
}

function registerPage(){

const urlParams = new URLSearchParams(location.hash.split("?")[1])
const refPhone = urlParams.get("ref") || ""

appDiv().innerHTML=`
<div class="card">
<h2>Create Account</h2>

<input id="name" placeholder="Full name">
<input id="phone" placeholder="Phone number">
<input id="wallet" placeholder="BEP20 wallet address">
<input id="password" type="password" placeholder="Password">
<input id="ref" placeholder="Referral phone" value="${refPhone}">
<button onclick="registerUser()">Register</button>

</div>`
}

window.registerUser=async()=>{

const name=v("name")
const phone=v("phone")
const wallet=v("wallet")
const password=v("password")
const referrer=v("ref")

if(!walletRegex.test(wallet)) return alert("Invalid BEP20 wallet")
  const usersSnap = await get(ref(db,"users"))
let walletExists = false

usersSnap.forEach(s=>{
if(s.val().wallet === wallet){
walletExists = true
}
})

if(walletExists) return alert("This wallet is already registered")

const userSnap=await get(ref(db,"users/"+phone))
if(userSnap.exists()) return alert("User exists")

await set(ref(db,"users/"+phone),{
name,
wallet,
password:btoa(password),
balance:0,
investment:0,
locked:0,
lockDate:0,
referrer:referrer||"",
createdAt:Date.now()
})

alert("Registration successful")
location.hash="#login"
}

function loginPage(){
appDiv().innerHTML=`
<div class="card">
<h2>Login</h2>

<input id="phone" placeholder="Phone">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
</div>`
}

window.login=async()=>{

const phone=v("phone")
const pass=v("password")

if(phone==="admin" && pass==="Jaihanuman@7"){
localStorage.setItem("admin","1")
location.hash="#admin"
return
}

const snap=await get(ref(db,"users/"+phone))
if(!snap.exists()) return alert("User not found")

const user=snap.val()

if(atob(user.password)!==pass) return alert("Wrong password")

localStorage.setItem("user",phone)

location.hash="#user"
}

function userDashboard(){

const phone=localStorage.getItem("user")
if(!phone) return location.hash="#login"

onValue(ref(db,"users/"+phone),snap=>{

const u=snap.val()

appDiv().innerHTML=`

<div class="grid">

<div class="card">
<h3>Balance</h3>
${Number(u.balance||0).toFixed(2)} TMPL
</div>

<div class="card">
<h3>Total Investment</h3>
${u.investment||0} USDT
</div>

<div class="card">
<h3>Locked</h3>
${Number(u.locked||0).toFixed(2)} TMPL
</div>

<div class="card">
<h3>Wallet</h3>
<div class="small">${u.wallet}</div>
</div>

</div>

<div class="card">
<h3>Invest</h3>

<p class="small">Send USDT (BEP20) to this address:</p>

<input id="depositAddress" value="0x2760f05248a8377d3fdD86b80A3D48B010d5De95" readonly>

<button onclick="copyAddress()">Copy Address</button>

<br><br>

<input id="invest" placeholder="USDT amount">
<button onclick="invest()">Submit Investment</button>

<p class="small">
After sending USDT click submit. Admin will verify and approve.
</p>

</div>

<div class="card">
<h3>Withdraw</h3>
<input id="withdraw" placeholder="TMPL amount">
<button onclick="withdraw()">Request Withdrawal</button>
</div>

<div class="card">
<h3>Withdrawal History</h3>
<div id="withdrawHistory"></div>
</div>

<div class="card">
<h3>Investment History</h3>
<div id="investHistory"></div>
</div>

<div class="card">
<h3>Referral Link</h3>
${location.origin+location.pathname+"#register?ref="+phone}
</div>
<div class="card center">
<button onclick="logout()">Logout</button>
</div>

`

autoRelease(phone,u)
  loadInvestHistory(phone)

  loadWithdrawHistory(phone)

})
}
  window.copyAddress = ()=>{
const copyText=document.getElementById("depositAddress")
copyText.select()
copyText.setSelectionRange(0,99999)
navigator.clipboard.writeText(copyText.value)
alert("Deposit address copied")
}

window.invest=async()=>{

const phone=localStorage.getItem("user")
const amount=parseFloat(v("invest"))

if(!amount) return alert("Enter amount")
if(amount<20 || amount>250)
return alert("Investment must be between 20 - 250 USDT")

// pending investment check
const pendingSnap = await get(ref(db,"investments/pending/"+phone))
if(pendingSnap.exists())
return alert("Your previous investment is still pending approval")

// active investment check
const userSnap = await get(ref(db,"users/"+phone))
const u = userSnap.val()

if(u.locked>0)
return alert("You already have an active investment. Please wait until all tokens are released.")

const price=await getPrice()
const tmpl=Number((amount/price).toFixed(2))

await set(ref(db,"investments/pending/"+phone),{
amountUSDT:amount,
tmplAmount:tmpl,
timestamp:Date.now()
})

alert("Investment submitted for approval")
}
  window.rejectInvest = async(phone)=>{

await remove(ref(db,"investments/pending/"+phone))

alert("Investment rejected")

}

window.withdraw = async () => {
  const phone = localStorage.getItem("user")
  const amount = parseFloat(v("withdraw"))

  if (!amount || amount <= 0) return alert("Invalid amount")

  const pending = await get(ref(db, "withdrawals/pending/" + phone))
  if (pending.exists()) return alert("Withdrawal already pending")

  const snap = await get(ref(db, "users/" + phone))
  const u = snap.val()

  // ✅ Block withdrawal if user never invested
  if ((u.investment || 0) <= 0) return alert("Withdrawal not allowed without investment")

  // ✅ Only allow if requested amount <= released balance
  if (amount > u.balance) return alert("Insufficient balance")

  await set(ref(db, "withdrawals/pending/" + phone), {
    amount,
    wallet: u.wallet,
    timestamp: Date.now()
  })

  alert("Withdrawal request submitted")
}

function adminDashboard(){

if(!localStorage.getItem("admin")) return location.hash="#login"

onValue(ref(db,"users"),snap=>{

let rows=""

snap.forEach(s=>{
const p=s.key
const u=s.val()

rows+=`
<tr>
<td>${p}</td>
<td>${u.name}</td>
<td>${u.balance}</td>
<td>${u.investment}</td>
<td>
  <button onclick="editUser('${p}')">Edit ID</button>
  <button onclick="deleteUser('${p}')">Delete</button>
  <button onclick="releaseLocked('${p}')">Release Locked</button>
</td>
</tr>`
})

appDiv().innerHTML=`

<div class="card">
<h2>Admin Dashboard</h2>

<input id="price" placeholder="Update TMPL price">
<button onclick="updatePrice()">Update Price</button>

<button onclick="adminLogout()">Admin Logout</button>
</div>

<div class="card">

<h3>Users</h3>

<table>
<tr>
<th>ID</th>
<th>Name</th>
<th>Balance</th>
<th>Investment</th>
<th>Action</th>
</tr>

${rows}
</table>

</div>

<div class="card">
<h3>Pending Investments</h3>
<div id="pendingInvest"></div>
</div>

<div class="card">
<h3>Pending Withdrawals</h3>
<div id="pendingWithdraw"></div>
</div>

`

loadPendingInvest()
loadPendingWithdraw()

})
}

async function loadPendingInvest(){

const snap = await get(ref(db,"investments/pending"))
let html=""

for(const child of Object.entries(snap.val() || {})){

const phone = child[0]
const d = child[1]

const userSnap = await get(ref(db,"users/"+phone))
const user=userSnap.val()

html+=`
<div class="card">
<b>User:</b> ${phone}<br>
<b>Wallet:</b> ${user.wallet}<br>
<b>Amount:</b> ${d.amountUSDT} USDT
<br><br>
<button onclick="approveInvest('${phone}')">Approve</button>
<button onclick="rejectInvest('${phone}')">Reject</button>
</div>`

}

document.getElementById("pendingInvest").innerHTML=html || "No pending investments"

}

async function loadPendingWithdraw(){

const snap=await get(ref(db,"withdrawals/pending"))
let html=""

snap.forEach(s=>{
const p=s.key
const d=s.val()

html+=`
<div class="card">
<b>User:</b> ${p}<br>
<b>Amount:</b> ${d.amount} TMPL<br>
<b>Wallet:</b> ${d.wallet}
<br><br>
<button onclick="approveWithdraw('${p}')">Approve</button>
</div>`
})

document.getElementById("pendingWithdraw").innerHTML=html

}

window.approveInvest=async(phone)=>{

const snap=await get(ref(db,"investments/pending/"+phone))
const d=snap.val()

const userSnap=await get(ref(db,"users/"+phone))
const u=userSnap.val()

const newInvestment=(u.investment||0)+d.amountUSDT
const newLocked=(u.locked||0)+d.tmplAmount

await update(ref(db,"users/"+phone),{
investment:newInvestment,
locked:newLocked,
lockDate:u.lockDate||Date.now()
})
  await push(ref(db,"investments/history/"+phone),{
amountUSDT:d.amountUSDT,
tmplAmount:d.tmplAmount,
time:Date.now()
})

await distributeReferral(phone,d.amountUSDT)

const poolSnap=await get(ref(db,"liquidityPool"))
const pool=(poolSnap.val()||0)+d.amountUSDT
await set(ref(db,"liquidityPool"),pool)

await remove(ref(db,"investments/pending/"+phone))

alert("Investment approved")
}

window.approveWithdraw=async(phone)=>{

const snap=await get(ref(db,"withdrawals/pending/"+phone))
const d=snap.val()

const userSnap=await get(ref(db,"users/"+phone))
const u=userSnap.val()

if(u.balance<d.amount) return alert("Insufficient balance")

await update(ref(db,"users/"+phone),{
balance:u.balance-d.amount
})
  await push(ref(db,"withdrawals/history/"+phone),{
amount:d.amount,
wallet:d.wallet,
time:Date.now()
})

await remove(ref(db,"withdrawals/pending/"+phone))

alert("Withdrawal approved")
}

async function distributeReferral(phone,amount){

const levels=[10,5,2.5,1,1,1,0.9,0.8,0.7,0.6,0.5,0.4,0.3,0.2,0.1]

let current=phone

const price=await getPrice()
const tmpl=amount/price

for(let i=0;i<15;i++){

const s=await get(ref(db,"users/"+current))
if(!s.exists()) break

const referrer=s.val().referrer
if(!referrer) break

const rSnap=await get(ref(db,"users/"+referrer))
const r=rSnap.val()

const bonus=tmpl*(levels[i]/100)

await update(ref(db,"users/"+referrer),{
balance:Number((r.balance+bonus).toFixed(2))
})

current=referrer

}
}

function autoRelease(phone,u){

if(!u.lockDate || !u.locked) return

const days=(Date.now()-u.lockDate)/(1000*60*60*24)

if(days>=30){

const release=u.locked*0.05

let newLocked=u.locked-release

if(newLocked<0) newLocked=0

update(ref(db,"users/"+phone),{
balance:(u.balance||0)+release,
locked:newLocked,
lockDate:Date.now()
})

}
}

  window.releaseLocked = async (phone) => {
  const snap = await get(ref(db, "users/" + phone));
  if (!snap.exists()) return alert("User not found");

  const u = snap.val();
  if (!u.locked || u.locked <= 0) return alert("No locked tokens to release");

  // Release full locked amount to balance
  const releasedAmount = u.locked;

  await update(ref(db, "users/" + phone), {
    balance: (u.balance || 0) + releasedAmount,
    locked: 0,
    lockDate: 0 // reset lock date
  });

  alert(`Released ${releasedAmount} TMPL to ${phone}'s balance`);
};

async function getPrice(){
const s=await get(ref(db,"config/tmplPrice"))
return s.exists()?s.val():0.0002
}

window.updatePrice=async()=>{
const p=parseFloat(v("price"))
await set(ref(db,"config/tmplPrice"),p)
alert("Price updated")
}
  window.editUser = async(oldId)=>{

const newId = prompt("Enter new user ID")

if(!newId) return

const snap = await get(ref(db,"users/"+oldId))
if(!snap.exists()) return alert("User not found")

const data = snap.val()

// new id save
await set(ref(db,"users/"+newId),data)

// old id delete
await remove(ref(db,"users/"+oldId))

alert("User ID updated")

}

window.deleteUser=async(id)=>{
await remove(ref(db,"users/"+id))
}


  window.logout=()=>{
localStorage.removeItem("user")
location.hash="#login"
}
  window.adminLogout=()=>{
localStorage.removeItem("admin")
location.hash="#login"
}
  
  function loadInvestHistory(phone){

onValue(ref(db,"investments/history/"+phone),snap=>{

let list=[]

snap.forEach(s=>{
list.push(s.val())
})

list=list.reverse().slice(0,25)

let html=""

list.forEach(d=>{

const date=new Date(d.time).toLocaleDateString()

html+=`
<div class="small">
${date} → ${d.amountUSDT} USDT
</div>
`

})

document.getElementById("investHistory").innerHTML=
html || "No investment yet"

})

}

  function loadWithdrawHistory(phone){

onValue(ref(db,"withdrawals/history/"+phone),snap=>{

let list=[]

snap.forEach(s=>{
list.push(s.val())
})

list=list.reverse().slice(0,25)

let html=""

list.forEach(d=>{

const date=new Date(d.time).toLocaleDateString()

html+=`
<div class="small">
${date} → ${d.amount} TMPL
</div>
`

})

document.getElementById("withdrawHistory").innerHTML=
html || "No withdrawals yet"

})

}

function v(id){return document.getElementById(id).value.trim()}
function appDiv(){return document.getElementById("app")}

</script>


</body>
