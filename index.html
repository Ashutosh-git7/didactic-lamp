<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMPL Token Dashboard</title>

<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(135deg,#0a0f1f,#141c34);
color:#fff;
}
.container{max-width:950px;margin:auto;padding:15px;}
.card{
background:rgba(28,35,58,.9);
padding:15px;
margin:10px 0;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,.5);
backdrop-filter:blur(8px);
}
input,button{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:none;
}
input{background:#0e1426;color:#fff;}
button{
background:#00c2ff;
color:#000;
font-weight:bold;
cursor:pointer;
}
.hidden{display:none;}
.flex{display:flex;gap:8px;}
.flex button{flex:1;}
h2{text-align:center;}
.small{font-size:12px;color:#aaa;}
</style>
</head>

<body>
<div class="container">

<!-- REGISTER -->
<div id="registerPage" class="card">
<h2>TMPL Register</h2>
<input id="rName" placeholder="Name">
<input id="rMobile" placeholder="Mobile">
<input id="rPassword" type="password" placeholder="Password">
<input id="rWallet" placeholder="BEP20 Wallet">
<button onclick="register()">Register</button>
<div class="small">Already registered? <a href="#" onclick="showLogin()">Login</a></div>
</div>

<!-- LOGIN -->
<div id="loginPage" class="card hidden">
<h2>Login</h2>
<input id="lMobile" placeholder="Mobile">
<input id="lPassword" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<div class="flex">
<button onclick="show('home')">Dashboard</button>
<button onclick="show('team')">Team</button>
<button onclick="logout()">Logout</button>
</div>

<div id="home" class="card">
<h2>TMPL Dashboard</h2>
<div id="stats"></div>

<h3>Investment</h3>
<input id="joinAmt" placeholder="Min 20 USDT">
<button onclick="submitJoin()">Submit Investment</button>

<h3>Withdraw</h3>
<input id="withdrawAmt" placeholder="Min 5 USDT Equivalent">
<button onclick="withdraw()">Request Withdraw</button>

<h3>Referral</h3>
<input id="refLink" readonly>
<button onclick="copyRef()">Copy</button>
</div>

<div id="team" class="card hidden">
<h3>Your Team</h3>
<div id="teamList"></div>
</div>

</div>

<!-- ADMIN LOGIN -->
<div id="adminLogin" class="card hidden">
<h2>Admin Login</h2>
<input id="aid" placeholder="ID">
<input id="apass" type="password" placeholder="Password">
<button onclick="adminLogin()">Login</button>
</div>

<div id="adminPanel" class="hidden">

<div class="card">
<h3>Live Price</h3>
<input id="priceInput" placeholder="TMPL Price (USDT)">
<button onclick="updatePrice()">Update Price</button>
</div>

<div class="card">
<h3>Users</h3>
<div id="users"></div>
</div>

<div class="card">
<h3>Withdraw Requests</h3>
<div id="withdrawList"></div>
</div>

</div>

</div>

<script>
/* ---------- FIREBASE CONFIG ---------- */
var firebaseConfig={
apiKey:"ADD_KEY",
authDomain:"ADD_DOMAIN",
databaseURL:"ADD_DB_URL",
projectId:"ADD_ID"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();
const auth=firebase.auth();

/* ---------- GLOBAL ---------- */
let user=null;
const ADMIN_ID="Admin";
const ADMIN_PASS="Jaihanuman@7";

/* ---------- HASH ---------- */
async function sha256(msg){
const buf=new TextEncoder().encode(msg);
const hash=await crypto.subtle.digest("SHA-256",buf);
return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

/* ---------- ROUTING ---------- */
if(location.hash==="#admin"){
registerPage.classList.add("hidden");
adminLogin.classList.remove("hidden");
}

function showLogin(){
registerPage.classList.add("hidden");
loginPage.classList.remove("hidden");
}

/* ---------- REGISTER ---------- */
function getRef(){
return new URLSearchParams(location.search).get("ref")||"";
}
function genRef(){
return Math.random().toString(36).substr(2,5);
}

async function register(){
let name=rName.value.trim();
let mobile=rMobile.value.trim();
let pass=rPassword.value;
let wallet=rWallet.value.trim();

if(!name||!mobile||!pass||!wallet) return alert("Fill all");

let hash=await sha256(pass);

db.ref("users/"+mobile).once("value",snap=>{
if(snap.exists()) return alert("User exists");

db.ref("users/"+mobile).set({
name,mobile,
password:hash,
wallet,
refCode:genRef(),
upline:getRef(),
investment:0,
tmpl:0,
refEarnings:0
});
alert("Registered");
showLogin();
});
}

/* ---------- LOGIN ---------- */
async function login(){
let mobile=lMobile.value;
let pass=lPassword.value;
let hash=await sha256(pass);

db.ref("users/"+mobile).once("value",snap=>{
if(!snap.exists()) return alert("User not found");
if(snap.val().password!==hash) return alert("Wrong password");

localStorage.setItem("tmplUser",mobile);
startSession(mobile);
});
}

function startSession(mobile){
user=mobile;
registerPage.classList.add("hidden");
loginPage.classList.add("hidden");
dashboard.classList.remove("hidden");
loadDashboard();
}

window.onload=function(){
let s=localStorage.getItem("tmplUser");
if(s) startSession(s);
}

/* ---------- DASHBOARD ---------- */
function loadDashboard(){
db.ref("users/"+user).on("value",snap=>{
let u=snap.val();
db.ref("stats").once("value",s=>{
let st=s.val()||{};
stats.innerHTML=`
<div class="card">
Investment: ${u.investment||0} USDT<br>
TMPL Balance: ${u.tmpl||0}<br>
Referral Earnings: ${u.refEarnings||0}<br>
Live Price: ${st.livePrice||0} USDT<br>
Liquidity: ${st.liquidity||0}
</div>`;
});
refLink.value=location.origin+location.pathname+"?ref="+u.refCode;
loadTeam(u.refCode);
});
}

/* ---------- TEAM ---------- */
function loadTeam(code){
teamList.innerHTML="";
db.ref("users").once("value",snap=>{
snap.forEach(c=>{
if(c.val().upline===code)
teamList.innerHTML+=`<div class="card">${c.val().name}</div>`;
});
});
}

/* ---------- INVEST ---------- */
function submitJoin(){
let amt=parseFloat(joinAmt.value);
if(amt<20) return alert("Minimum 20");

let id=Date.now();
db.ref("joins/"+id).set({
user,amount:amt,status:"pending"
});
alert("Submitted");
}

/* ---------- WITHDRAW ---------- */
function withdraw(){
let amt=parseFloat(withdrawAmt.value);
if(amt<5) return alert("Min 5");

db.ref("stats/livePrice").once("value",snap=>{
let price=snap.val()||1;
let tmpl=amt/price;

let id=Date.now();
db.ref("withdrawals/"+id).set({
user,usdt:amt,tmpl,status:"pending"
});
alert("Requested");
});
}

/* ---------- ADMIN ---------- */
function adminLogin(){
if(aid.value===ADMIN_ID && apass.value===ADMIN_PASS){
adminLogin.style.display="none";
adminPanel.classList.remove("hidden");
loadUsers();
loadWithdraws();
}else alert("Wrong");
}

function loadUsers(){
db.ref("users").on("value",snap=>{
users.innerHTML="";
snap.forEach(c=>{
let u=c.val();
users.innerHTML+=`
<div class="card">
${u.name} (${u.mobile})
<br>Wallet: ${u.wallet}
<button onclick="approveJoin('${u.mobile}')">Approve Investment</button>
</div>`;
});
});
}

function approveJoin(mobile){
let amt=parseFloat(prompt("Investment amount"));
processJoin(mobile,amt);
}

/* ---------- BUSINESS LOGIC ---------- */
function processJoin(mobile,amount){
splitInvestment(mobile,amount);
db.ref("users/"+mobile+"/investment")
.transaction(v=>(v||0)+amount);
}

function splitInvestment(mobile,amount){
let liquidity=amount*0.5;
let commission=amount*0.3;
let company=amount*0.2;

db.ref("stats/liquidity").transaction(v=>(v||0)+liquidity);
db.ref("companyFund").transaction(v=>(v||0)+company);

addLiquidityLog(liquidity);
distributeCommission(mobile,commission);
}

function distributeCommission(userId,amount){
const levels=[10,5,3,2,2,1.5,1.5,1.5,1.5,1.5,1,1,1,1,1];

db.ref("stats/livePrice").once("value",p=>{
let price=p.val()||1;
let tmplTotal=calculateTMPL(amount,price);

db.ref("users/"+userId).once("value",snap=>{
let up=snap.val().upline;
let level=0;

function pay(upline){
if(!upline||level>=15) return;

db.ref("users").orderByChild("refCode").equalTo(upline)
.once("value",res=>{
res.forEach(us=>{
let share=tmplTotal*(levels[level]/100);
db.ref("users/"+us.key+"/tmpl")
.transaction(v=>(v||0)+share);
level++;
pay(us.val().upline);
});
});
}
pay(up);
});
});
}

function calculateTMPL(usdt,price){
return usdt/price;
}

function addLiquidityLog(value){
db.ref("liquidityLogs/"+Date.now()).set({value});
}

/* ---------- ADMIN PRICE ---------- */
function updatePrice(){
db.ref("stats/livePrice").set(parseFloat(priceInput.value));
}

/* ---------- WITHDRAW ADMIN ---------- */
function loadWithdraws(){
db.ref("withdrawals").on("value",snap=>{
withdrawList.innerHTML="";
snap.forEach(c=>{
let w=c.val();
withdrawList.innerHTML+=`
<div class="card">
${w.user} - ${w.usdt} USDT
<button onclick="approveWithdraw('${c.key}')">Approve</button>
</div>`;
});
});
}

function approveWithdraw(id){
db.ref("withdrawals/"+id+"/status").set("approved");
}

/* ---------- UI ---------- */
function show(id){
home.classList.add("hidden");
team.classList.add("hidden");
document.getElementById(id).classList.remove("hidden");
}

function copyRef(){
navigator.clipboard.writeText(refLink.value);
alert("Copied");
}

function logout(){
localStorage.removeItem("tmplUser");
location.reload();
}
</script>
</body>
</html>
