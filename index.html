<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMPL Ultimate V2</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#0b0f1a;color:#fff}
nav{display:flex;justify-content:space-between;padding:15px;background:#111826}
nav a{color:#00e1ff;margin-left:10px;text-decoration:none}
.container{max-width:1100px;margin:auto;padding:20px}
.card{background:#111826;padding:20px;border-radius:10px;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px}
input,button{width:100%;padding:10px;margin:6px 0;border:none;border-radius:6px}
input{background:#0b0f1a;color:#fff}
button{background:#0077ff;color:#fff;font-weight:bold;cursor:pointer}
table{width:100%;border-collapse:collapse}
td,th{padding:8px;border-bottom:1px solid #333;font-size:13px}
#map{height:300px}
</style>
</head>

<body>

<nav>
<div>TMPL Ultimate</div>
<div>
<a href="#">Home</a>
<a href="#login">Login</a>
<a href="#register">Register</a>
</div>
</nav>

<div class="container" id="app"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, update, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyBZh-Wg8JK5x4kBCag8zxDXw-eVY_LZmUw",
authDomain:"tmpl-cd770.firebaseapp.com",
databaseURL:"https://tmpl-cd770-default-rtdb.firebaseio.com/",
projectId:"tmpl-cd770",
storageBucket:"tmpl-cd770.appspot.com",
messagingSenderId:"383728687521",
appId:"1:383728687521:web:b3ac6cd7fde979cb8b13e0"
}

const app=initializeApp(firebaseConfig)
const db=getDatabase(app)

const walletRegex=/^0x[a-fA-F0-9]{40}$/

const routes={
"#":landing,
"#login":login,
"#register":register,
"#user":dashboard,
"#admin":admin
}

window.addEventListener("hashchange",router)
router()

function router(){
(routes[location.hash||"#"]||landing)()
}

function appDiv(){
return document.getElementById("app")
}

function v(id){
return document.getElementById(id).value.trim()
}

function landing(){

appDiv().innerHTML=`
<div class="card">
<h2>TMPL Ultimate Web3 Platform</h2>
<a href="#register"><button>Register</button></a>
<a href="#login"><button>Login</button></a>
</div>
`

}

function register(){

appDiv().innerHTML=`

<div class="card">

<h2>Create Account</h2>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone">
<input id="wallet" placeholder="BEP20 Wallet">
<input id="password" type="password" placeholder="Password">
<input id="ref" placeholder="Referral Phone">

<button onclick="registerUser()">Register</button>

</div>

`
}

window.registerUser=async()=>{

const name=v("name")
const phone=v("phone")
const wallet=v("wallet")
const password=v("password")
const referrer=v("ref")

if(!walletRegex.test(wallet))
return alert("Invalid wallet")

const snap=await get(ref(db,"users/"+phone))
if(snap.exists()) return alert("User exists")

await set(ref(db,"users/"+phone),{

name,
wallet,
password:btoa(password),

balance:0,
investment:0,
locked:0,
lockDate:0,

referrer:referrer||"",
location:randomLocation(),

created:Date.now()

})

alert("Registration successful")
location.hash="#login"

}

function login(){

appDiv().innerHTML=`

<div class="card">

<h2>Login</h2>

<input id="phone" placeholder="Phone">
<input id="password" type="password" placeholder="Password">

<button onclick="loginUser()">Login</button>

</div>

`
}

window.loginUser=async()=>{

const phone=v("phone")
const pass=v("password")

if(phone==="admin" && pass==="admin123"){

localStorage.setItem("admin","1")
location.hash="#admin"
return

}

const snap=await get(ref(db,"users/"+phone))
if(!snap.exists()) return alert("User not found")

const u=snap.val()

if(atob(u.password)!==pass)
return alert("Wrong password")

localStorage.setItem("user",phone)

location.hash="#user"

}

function dashboard(){

const phone=localStorage.getItem("user")
if(!phone) return location.hash="#login"

onValue(ref(db,"users/"+phone),snap=>{

const u=snap.val()

autoRelease(phone,u)

appDiv().innerHTML=`

<div class="grid">

<div class="card">
<h3>Balance</h3>
${Number(u.balance).toFixed(2)} TMPL
</div>

<div class="card">
<h3>Investment</h3>
${u.investment} USDT
</div>

<div class="card">
<h3>Locked</h3>
${Number(u.locked).toFixed(2)} TMPL
</div>

</div>

<div class="card">

<h3>Invest</h3>

<input id="invest" placeholder="50-500 USDT">

<button onclick="invest()">Submit</button>

</div>

<div class="card">

<h3>Withdraw</h3>

<input id="withdraw">

<button onclick="withdraw()">Request</button>

</div>

<div class="card">

<h3>Referral Link</h3>

${location.origin+location.pathname+"#register?ref="+phone}

</div>

<div class="card">

<h3>Team Map</h3>

<div id="map"></div>

</div>

<div class="card">

<button onclick="logout()">Logout</button>

</div>

`

setTimeout(loadMap,500)

})

}

window.invest=async()=>{

const phone=localStorage.getItem("user")
const amount=parseFloat(v("invest"))

if(amount<50||amount>500)
return alert("Investment must be 50-500 USDT")

const price=await getPrice()
const tmpl=(amount/price)

await set(ref(db,"investments/pending/"+phone),{

amountUSDT:amount,
tmplAmount:tmpl,
timestamp:Date.now()

})

alert("Investment submitted")

}

window.withdraw=async()=>{

const phone=localStorage.getItem("user")
const amount=parseFloat(v("withdraw"))

const snap=await get(ref(db,"users/"+phone))
const u=snap.val()

if(amount>u.balance)
return alert("Insufficient balance")

await set(ref(db,"withdrawals/pending/"+phone),{

amount,
timestamp:Date.now()

})

alert("Withdrawal request sent")

}

function admin(){

if(!localStorage.getItem("admin"))
return location.hash="#login"

onValue(ref(db,"users"),snap=>{

let rows=""

snap.forEach(s=>{

const p=s.key
const u=s.val()

rows+=`

<tr>
<td>${p}</td>
<td>${u.name}</td>
<td>${u.balance}</td>
<td>${u.investment}</td>
<td><button onclick="deleteUser('${p}')">Delete</button></td>
</tr>

`

})

appDiv().innerHTML=`

<div class="card">

<h2>Admin Dashboard</h2>

</div>

<div class="card">

<table>

<tr>
<th>ID</th>
<th>Name</th>
<th>Balance</th>
<th>Investment</th>
<th>Action</th>
</tr>

${rows}

</table>

</div>

`

})

}

window.logout=()=>{

localStorage.removeItem("user")
localStorage.removeItem("admin")

location.hash="#"

}

window.deleteUser=async(id)=>{

await remove(ref(db,"users/"+id))

}

async function getPrice(){

const s=await get(ref(db,"config/tmplPrice"))
return s.exists()?s.val():0.0002

}

function autoRelease(phone,u){

if(!u.lockDate||!u.locked) return

const days=(Date.now()-u.lockDate)/(1000*60*60*24)

if(days>=30){

const release=u.locked*0.05

update(ref(db,"users/"+phone),{

balance:(u.balance||0)+release,
locked:u.locked-release,
lockDate:Date.now()

})

}

}

function loadMap(){

if(!document.getElementById("map")) return

const map=L.map("map").setView([20,0],2)

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map)

onValue(ref(db,"users"),snap=>{

snap.forEach(s=>{

const u=s.val()

if(u.location){

L.marker([u.location.lat,u.location.lng]).addTo(map)

}

})

})

}

function randomLocation(){

return{

lat:(Math.random()*140)-70,
lng:(Math.random()*360)-180

}

}

</script>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</body>
</html>
