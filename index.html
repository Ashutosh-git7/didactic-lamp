<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TMPL Ecosystem</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}
.card{
background:#1e293b;
padding:15px;
margin:10px 0;
border-radius:10px;
}
input,button{
width:100%;
padding:10px;
margin:5px 0;
border-radius:6px;
border:none;
}
button{
background:#22c55e;
color:white;
font-weight:bold;
}
.hidden{display:none;}
</style>
</head>

<body>

<h2>🪙 TMPL Dashboard</h2>

<!-- REGISTER -->
<div id="register" class="card">
<h3>Register</h3>
<input id="rname" placeholder="Name">
<input id="rmobile" placeholder="Mobile">
<input id="rwallet" placeholder="USDT Wallet">
<input id="rref" placeholder="Referral Code (optional)">
<button onclick="register()">Create Account</button>
</div>

<!-- LOGIN -->
<div id="login" class="card">
<h3>Login</h3>
<input id="lmobile" placeholder="Mobile">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dash" class="hidden">

<div class="card">
<h3>User Info</h3>
<p id="userinfo"></p>
</div>

<div class="card">
<h3>Investment</h3>
<input id="amount" placeholder="USDT Amount">
<button onclick="invest()">Submit Investment</button>
</div>

<div class="card">
<h3>Balance</h3>
<p id="balance">0 TMPL</p>
</div>

<button onclick="logout()">Logout</button>

</div>

<!-- ADMIN -->
<div class="card">
<h3>Admin Panel</h3>
<input id="adminpass" placeholder="Admin Password">
<button onclick="adminLogin()">Open Admin</button>

<div id="admin" class="hidden"></div>
</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getDatabase, ref, set, get, child, update
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBZh-Wg8JK5x4kBCag8zxDXw-eVY_LZmUw",
authDomain:"tmpl-cd770.firebaseapp.com",
projectId:"tmpl-cd770",
storageBucket:"tmpl-cd770.firebasestorage.app",
messagingSenderId:"383728687521",
appId:"1:383728687521:web:b3ac6cd7fde979cb8b13e0"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentUser=null;

/* REGISTER */
window.register = async function(){

let mobile=document.getElementById("rmobile").value;

await set(ref(db,'users/'+mobile),{
name:rname.value,
wallet:rwallet.value,
ref:rref.value || "",
balance:0,
investment:0
});

alert("Account Created");
}

/* LOGIN */
window.login = async function(){

let mobile=lmobile.value;

const snapshot = await get(child(ref(db),'users/'+mobile));

if(snapshot.exists()){
currentUser=mobile;
document.getElementById("dash").classList.remove("hidden");
loadUser();
}else{
alert("User not found");
}
}

/* LOAD USER */
async function loadUser(){

const snap=await get(child(ref(db),'users/'+currentUser));
let d=snap.val();

userinfo.innerHTML=
"Name: "+d.name+"<br>Wallet: "+d.wallet;

balance.innerHTML=d.balance+" TMPL";
}

/* INVEST */
window.invest = async function(){

let amt=parseFloat(amount.value);

const userRef=ref(db,'users/'+currentUser);

const snap=await get(userRef);
let data=snap.val();

let newInvestment=data.investment+amt;

await update(userRef,{
investment:newInvestment
});

alert("Investment Submitted (Admin Approval Pending)");
}

/* LOGOUT */
window.logout=function(){
location.reload();
}

/* ADMIN */
window.adminLogin=async function(){

if(adminpass.value!=="Admin@123"){
alert("Wrong password");
return;
}

admin.classList.remove("hidden");

const snap=await get(ref(db,'users'));

let html="<h4>Users</h4>";

snap.forEach(u=>{

let d=u.val();

html+=`
<div class='card'>
${d.name} (${u.key})
<br>Investment: ${d.investment}
<button onclick="reward('${u.key}')">Give Reward</button>
</div>`;
});

admin.innerHTML=html;
}

/* REWARD SIMULATION */
window.reward=async function(uid){

const userRef=ref(db,'users/'+uid);

const snap=await get(userRef);
let d=snap.val();

let reward=d.investment*0.1;

await update(userRef,{
balance:d.balance+reward
});

alert("Reward Added");
}

</script>

</body>
</html>
