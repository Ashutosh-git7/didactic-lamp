<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMPL Pro Ecosystem</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#0b0f19;
color:white;
min-height:100vh;
}

a{
color:#00e1ff;
text-decoration:none;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.1);
}

.logo{
font-weight:bold;
font-size:18px;
}

.container{
padding:20px;
max-width:1100px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
padding:20px;
border-radius:12px;
margin-bottom:20px;
backdrop-filter:blur(12px);
}

input,button,select{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:12px;
border:none;
border-radius:6px;
}

input{
background:#111826;
color:white;
}

button{
background:linear-gradient(45deg,#00e1ff,#0077ff);
color:white;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:0.9;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:8px;
border-bottom:1px solid rgba(255,255,255,0.1);
font-size:13px;
}

th{
text-align:left;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.badge{
padding:4px 8px;
background:#222;
border-radius:5px;
font-size:12px;
}

#map{
height:300px;
border-radius:10px;
}

.center{
text-align:center;
}

.hidden{
display:none;
}

@media(max-width:700px){
nav{
flex-direction:column;
gap:8px;
}
}

</style>
</head>

<body>

<nav>
<div class="logo">TMPL PRO</div>
<div>
<a href="#">Home</a> |
<a href="#login">Login</a> |
<a href="#register">Register</a>
</div>
</nav>

<div class="container" id="app"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, update, remove, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyBZh-Wg8JK5x4kBCag8zxDXw-eVY_LZmUw",
authDomain: "tmpl-cd770.firebaseapp.com",
databaseURL: "https://tmpl-cd770-default-rtdb.firebaseio.com/",
projectId: "tmpl-cd770",
storageBucket: "tmpl-cd770.firebasestorage.app",
messagingSenderId: "383728687521",
appId: "1:383728687521:web:b3ac6cd7fde979cb8b13e0"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const walletRegex=/^0x[a-fA-F0-9]{40}$/;

const routes={
"#":landing,
"#login":loginPage,
"#register":registerPage,
"#user-dashboard":userDashboard,
"#admin-dashboard":adminDashboard
};

window.addEventListener("hashchange",router);
router();

function router(){
const hash=location.hash||"#";
(routes[hash]||landing)();
}

function landing(){

appDiv().innerHTML=`
<div class="card center">
<h2>TMPL Pro Ecosystem</h2>
<p>Decentralized investment platform with multi-level referral rewards.</p>
<br>
<a href="#register"><button>Register</button></a>
<a href="#login"><button>Login</button></a>
</div>
`;

}

function registerPage(){

appDiv().innerHTML=`
<div class="card">
<h2>Register</h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone (User ID)">
<input id="wallet" placeholder="BEP20 Wallet">
<input id="password" type="password" placeholder="Password">
<input id="ref" placeholder="Referral Phone (optional)">

<label><input type="checkbox" id="terms"> Accept Terms</label>

<button onclick="registerUser()">Register</button>

</div>
`;

}

window.registerUser=async()=>{

const name=v("name");
const phone=v("phone");
const wallet=v("wallet");
const password=v("password");
const referrer=v("ref");

if(!walletRegex.test(wallet))return alert("Invalid wallet");

const snap=await get(ref(db,"users/"+phone));

if(snap.exists())return alert("User exists");

const loc=randomLocation();

await set(ref(db,"users/"+phone),{

name,
wallet,
password:btoa(password),
balance:0,
investment:0,
locked:0,
lockDate:0,
referrer:referrer||"",
referrals:[],
investments:[],
withdrawals:[],
location:loc,
createdAt:Date.now()

});

alert("Registered");

location.hash="#login";

}

function loginPage(){

appDiv().innerHTML=`
<div class="card">
<h2>Login</h2>
<input id="phone" placeholder="Phone">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
`;

}

window.login=async()=>{

const phone=v("phone");
const pass=v("password");

if(phone==="admin" && pass==="admin123"){
localStorage.setItem("admin","1");
location.hash="#admin-dashboard";
return;
}

const snap=await get(ref(db,"users/"+phone));

if(!snap.exists())return alert("User not found");

const user=snap.val();

if(atob(user.password)!==pass)return alert("Wrong password");

localStorage.setItem("user",phone);

location.hash="#user-dashboard";

}

function userDashboard(){

const phone=localStorage.getItem("user");

if(!phone)return location.hash="#login";

onValue(ref(db,"users/"+phone),snap=>{

const u=snap.val();

const refLink=location.origin+location.pathname+"#ref="+phone;

appDiv().innerHTML=`

<div class="grid">

<div class="card">
<h3>Wallet</h3>
<p>${u.wallet}</p>
</div>

<div class="card">
<h3>Balance</h3>
<p>${u.balance||0} TMPL</p>
</div>

<div class="card">
<h3>Total Investment</h3>
<p>${u.investment||0} USDT</p>
</div>

<div class="card">
<h3>Locked</h3>
<p>${u.locked||0} TMPL</p>
</div>

</div>

<div class="card">
<h3>Referral Link</h3>
<p>${refLink}</p>
</div>

<div class="card">

<h3>Invest</h3>

<input id="investAmount" placeholder="USDT amount">
<button onclick="invest()">Submit Investment</button>

</div>

<div class="card">
<h3>Geology View</h3>
<div id="map"></div>
</div>

`;

loadMap();

});

}

window.invest=async()=>{

const phone=localStorage.getItem("user");
const amount=parseFloat(v("investAmount"));

if(!amount)return;

const price=await getPrice();

const tmpl=amount/price;

await set(ref(db,"investments/pending/"+phone),{

amountUSDT:amount,
tmplAmount:tmpl,
timestamp:Date.now(),
status:"pending"

});

alert("Investment submitted");

}

async function getPrice(){

const snap=await get(ref(db,"config/tmplPrice"));

if(snap.exists())return snap.val();

return 0.0002;

}

function adminDashboard(){

if(!localStorage.getItem("admin"))return location.hash="#login";

onValue(ref(db,"users"),snap=>{

const users=snap.val()||{};

let rows="";

Object.keys(users).forEach(p=>{

const u=users[p];

rows+=`
<tr>
<td>${p}</td>
<td>${u.name}</td>
<td>${u.wallet}</td>
<td>${u.balance}</td>
<td>${u.investment}</td>
<td>
<button onclick="delUser('${p}')">Delete</button>
</td>
</tr>
`;

});

appDiv().innerHTML=`

<div class="card">

<h2>Admin Dashboard</h2>

<div class="grid">

<div class="card">
<h3>Update TMPL Price</h3>
<input id="price">
<button onclick="updatePrice()">Update</button>
</div>

<div class="card">
<h3>Liquidity Pool</h3>
<p id="pool">Loading...</p>
</div>

</div>

</div>

<div class="card">
<h3>Users</h3>

<table>

<tr>
<th>ID</th>
<th>Name</th>
<th>Wallet</th>
<th>Balance</th>
<th>Investment</th>
<th>Action</th>
</tr>

${rows}

</table>

</div>

<div class="card">

<h3>Pending Investments</h3>

<div id="pending"></div>

</div>

`;

loadPending();

});

onValue(ref(db,"liquidityPool"),snap=>{
document.getElementById("pool").innerText=snap.val()||0;
});

}

async function loadPending(){

const snap=await get(ref(db,"investments/pending"));

let html="";

snap.forEach(s=>{

const p=s.key;
const d=s.val();

html+=`
<div class="card">
${p} invested ${d.amountUSDT} USDT
<button onclick="approveInvest('${p}')">Approve</button>
</div>
`;

});

document.getElementById("pending").innerHTML=html;

}

window.approveInvest=async(phone)=>{

const snap=await get(ref(db,"investments/pending/"+phone));
const d=snap.val();

const userSnap=await get(ref(db,"users/"+phone));
const u=userSnap.val();

const newInvestment=(u.investment||0)+d.amountUSDT;
const newLocked=(u.locked||0)+d.tmplAmount;

await update(ref(db,"users/"+phone),{
investment:newInvestment,
locked:newLocked,
lockDate:Date.now()
});

await distributeReferral(phone,d.amountUSDT);

const poolSnap=await get(ref(db,"liquidityPool"));
const pool=(poolSnap.val()||0)+d.amountUSDT;

await set(ref(db,"liquidityPool"),pool);

await remove(ref(db,"investments/pending/"+phone));

alert("Approved");

}

async function distributeReferral(phone,amount){

const levels=[10,8,5,3,2,1.5,1,0.8,0.7,0.6,0.5,0.4,0.3,0.2,0.1];

let current=phone;

for(let i=0;i<15;i++){

const snap=await get(ref(db,"users/"+current));

if(!snap.exists())break;

const referrer=snap.val().referrer;

if(!referrer)break;

const bonus=amount*(levels[i]/100);

const refSnap=await get(ref(db,"users/"+referrer));
const bal=(refSnap.val().balance||0)+bonus;

await update(ref(db,"users/"+referrer),{balance:bal});

current=referrer;

}

}

window.updatePrice=async()=>{

const price=parseFloat(v("price"));

await set(ref(db,"config/tmplPrice"),price);

alert("Price updated");

}

window.delUser=async(p)=>{

await remove(ref(db,"users/"+p));

}

function loadMap(){

setTimeout(()=>{

const map=L.map("map").setView([20,0],2);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

onValue(ref(db,"users"),snap=>{

snap.forEach(s=>{

const u=s.val();

if(u.location){

L.marker([u.location.lat,u.location.lng]).addTo(map);

}

});

});

},500);

}

function randomLocation(){

return{
lat:(Math.random()*140)-70,
lng:(Math.random()*360)-180
};

}

function v(id){
return document.getElementById(id).value.trim();
}

function appDiv(){
return document.getElementById("app");
}

</script>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</body>
</html>
