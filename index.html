<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TMPL ULTIMATE WEB3</title>

<style>
body{
margin:0;
font-family:Arial;
background:#020617;
color:#fff;
}
header{
background:#0f172a;
padding:15px;
text-align:center;
font-weight:bold;
}
.card{
background:#111827;
margin:15px;
padding:15px;
border-radius:10px;
}
input,button{
width:100%;
padding:10px;
margin:6px 0;
border-radius:6px;
border:none;
}
button{
background:#22c55e;
color:#000;
font-weight:bold;
}
.hide{display:none}
</style>
</head>

<body>

<header>🚀 TMPL ULTIMATE WEB3 ECOSYSTEM</header>

<!-- LOGIN -->
<div class="card" id="loginCard">
<h3>Login</h3>
<input id="loginUser" placeholder="User ID">
<button onclick="login()">Login</button>
<button onclick="showRegister()">Register</button>
</div>

<!-- REGISTER -->
<div class="card hide" id="registerCard">
<h3>Register</h3>
<input id="name" placeholder="Name">
<input id="wallet" placeholder="BEP20 Wallet">
<input id="ref" placeholder="Referral ID (optional)">
<button onclick="register()">Create Account</button>
</div>

<!-- DASHBOARD -->
<div class="card hide" id="dashboard">
<h3>Dashboard</h3>
<p>ID: <span id="uid"></span></p>
<p>Locked TMPL: <span id="locked">0</span></p>
<p>Released: <span id="released">0</span></p>

<input id="usdt" placeholder="USDT Amount (Min 20)">
<button onclick="invest()">Invest</button>

<button onclick="withdraw()">Withdraw Request</button>

<button onclick="openAdmin()">Admin Panel</button>
</div>

<!-- ADMIN -->
<div class="card hide" id="admin">
<h3>Admin Panel</h3>
<input id="adminPass" placeholder="Admin Password">
<button onclick="adminLogin()">Login</button>

<div id="adminArea" class="hide">
<h4>Withdraw Requests</h4>
<div id="withdrawList"></div>
</div>
</div>

<script type="module">

/* FIREBASE */
import {initializeApp}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,ref,set,get,update,onValue
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* 🔥 REPLACE THIS */
const firebaseConfig={
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
databaseURL:"YOUR_DB_URL",
projectId:"YOUR_PROJECT"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let currentUser=null;

/* UI */
const show=e=>e.classList.remove("hide");
const hide=e=>e.classList.add("hide");

window.showRegister=()=>{
hide(loginCard);
show(registerCard);
}

/* REGISTER */
window.register=async()=>{
let id="U"+Date.now();
await set(ref(db,"users/"+id),{
name:name.value,
wallet:wallet.value,
ref:ref.value||"",
locked:0,
released:0
});
alert("ID:"+id);
}

/* LOGIN */
window.login=async()=>{
const snap=await get(ref(db,"users/"+loginUser.value));
if(!snap.exists()) return alert("User not found");

currentUser=loginUser.value;
showDash();
}

/* DASHBOARD */
function showDash(){
hide(loginCard);
hide(registerCard);
show(dashboard);
uid.innerText=currentUser;
loadUser();
}

/* LOAD USER */
function loadUser(){
onValue(ref(db,"users/"+currentUser),snap=>{
let d=snap.val();
locked.innerText=d.locked||0;
released.innerText=d.released||0;
});
}

/* INVEST SYSTEM */
window.invest=async()=>{
let amt=parseFloat(usdt.value);
if(amt<20) return alert("Min 20 USDT");

let tmplPrice=0.5; // example price
let tokens=amt/tmplPrice;

await update(ref(db,"users/"+currentUser),{
locked:tokens
});

distributeLevels(amt);

alert("Investment Locked");
}

/* 15 LEVEL DISTRIBUTION */
async function distributeLevels(amount){

let percents=[
10,4,3,2.5,2,1.5,1.2,1,
0.9,0.8,0.7,0.6,0.5,0.4,0.4
];

let userSnap=await get(ref(db,"users/"+currentUser));
let refId=userSnap.val().ref;

for(let i=0;i<15;i++){
if(!refId) break;

let bonus=amount*(percents[i]/100);

let r=ref(db,"users/"+refId);
let s=await get(r);

if(s.exists()){
let data=s.val();
await update(r,{
released:(data.released||0)+bonus
});
refId=data.ref;
}
}
}

/* MONTHLY 5% RELEASE */
setInterval(async()=>{
if(!currentUser) return;

let r=ref(db,"users/"+currentUser);
let s=await get(r);

if(!s.exists())return;

let d=s.val();
if(d.locked<=0)return;

let release=d.locked*0.05;

await update(r,{
locked:d.locked-release,
released:(d.released||0)+release
});

},30000); // demo 30 sec

/* WITHDRAW */
window.withdraw=async()=>{
await set(ref(db,"withdraw/"+Date.now()),{
user:currentUser
});
alert("Request Sent");
}

/* ADMIN */
window.openAdmin=()=>{
show(admin);
}

window.adminLogin=()=>{
if(adminPass.value!=="Admin@123") return alert("Wrong");

show(adminArea);
loadWithdraws();
}

function loadWithdraws(){
onValue(ref(db,"withdraw"),snap=>{
withdrawList.innerHTML="";
snap.forEach(c=>{
withdrawList.innerHTML+=`
<div>${c.val().user}</div>`;
});
});
}

</script>
</body>
</html>
