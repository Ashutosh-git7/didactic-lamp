window.login = async () => {
  const phone = v("phone"); // Isme Email ya Phone daal sakte hain
  const pass = v("password");

  // --- ADMIN LOGIN (Check if input is Email) ---
  if (phone.includes("@")) {
    try {
      const userCredential = await signInWithEmailAndPassword(auth, phone, pass);
      const user = userCredential.user;

      // Database mein UID check karein
      const adminSnap = await get(ref(db, "admins/" + user.uid));
      
      if (adminSnap.exists()) {
        localStorage.setItem("admin", "1");
        location.hash = "#admin";
        alert("Admin Login Successful!");
      } else {
        alert("Aap authenticated hain par Admin list mein nahi hain.");
      }
    } catch (error) {
      alert("Admin Login Failed: " + error.message);
    }
    return;
  }

  // --- NORMAL USER LOGIN (By Phone) ---
  const snap = await get(ref(db, "users/" + phone));
  if (!snap.exists()) return alert("User not found");

  const user = snap.val();
  if (atob(user.password) !== pass) return alert("Wrong password");

  localStorage.setItem("user", phone);
  location.hash = "#user";
};

window.withdraw = async () => {
  const phone = localStorage.getItem("user")
  const amount = parseFloat(v("withdraw"))

  if (!amount || amount <= 0) return alert("Invalid amount")

  // 1. Ek baar mein max 1000 Temple_DA ki limit
  if (amount > 1000) {
    return alert("Ek baar mein maximum 1,000 Temple_DA hi withdraw kar sakte hain.")
  }

  // 2. Pending request check (Jab tak purani request approve nahi hogi, naya nahi lagega)
  const pending = await get(ref(db, "withdrawals/pending/" + phone))
  if (pending.exists()) {
    return alert("Aapka pichla withdrawal request abhi pending hai. Approval ke baad hi naya request laga sakte hain.")
  }

  const snap = await get(ref(db, "users/" + phone))
  const u = snap.val()

  // 3. Investment check
  if ((u.investment || 0) <= 0) return alert("Withdrawal not allowed without investment")

  // 4. Available balance check
  if (amount > u.balance) return alert("Insufficient balance")

  // --- EXTRA SECURITY: 24-Gante ki total limit check ---
  // History check karke dekhenge ki pichle 24 gante mein total kitna withdraw ho chuka hai
  const historySnap = await get(ref(db, "withdrawals/history/" + phone))
  let totalWithdrawnIn24Hours = 0
  const twentyFourHoursAgo = Date.now() - (24 * 60 * 60 * 1000)

  if (historySnap.exists()) {
    historySnap.forEach(child => {
      const record = child.val()
      if (record.time && record.time > twentyFourHoursAgo) {
        totalWithdrawnIn24Hours += parseFloat(record.amount || 0)
      }
    })
  }

  if (totalWithdrawnIn24Hours + amount > 1000) {
    const bachaHuaLimit = 1000 - totalWithdrawnIn24Hours
    return alert(`Daily Limit Exceeded! Aap pichle 24 gante mein pehle hi withdraw kar chuke hain. Aaj aap maximum ${bachaHuaLimit.toFixed(2)} Temple_DA aur withdraw kar sakte hain.`)
  }
  // --- END OF SECURITY CHECK ---

  // Request database mein save karein
  await set(ref(db, "withdrawals/pending/" + phone), {
    amount,
    wallet: u.wallet,
    timestamp: Date.now()
  })

  alert("Withdrawal request successfully submitted for approval!")
}

window.approveInvest = async (phone) => {
    // 1. Pending investment data fetch karein
    const snap = await get(ref(db, "investments/pending/" + phone));
    const d = snap.val();

    const userSnap = await get(ref(db, "users/" + phone));
    const u = userSnap.val();

    // 2. Naya Price fetch karein (Latest price lene ke liye)
    const currentPrice = await getPrice();

    // 3. Locked Temple_DA ko naye price par recalculate karein
    // Taaki locked amount aur referral dono same price par rahein
    const newTemple_DAAmount = Number((d.amountUSDT / currentPrice).toFixed(2));

    const newInvestment = (u.investment || 0) + d.amountUSDT;
    const newLocked = (u.locked || 0) + newTemple_DAAmount;

    // 4. Database Update
    await update(ref(db, "users/" + phone), {
        investment: newInvestment,
        locked: newLocked,
        lockDate: u.lockDate || Date.now()
    });

    // History mein bhi updated amount save karein
    await push(ref(db, "investments/history/" + phone), {
        amountUSDT: d.amountUSDT,
        temple_DAAmount: newTemple_DAAmount, // Updated amount
        type: "invest",
        time: Date.now()
    });

    // Referral distribution ab naye price par automatic sahi calculate hoga
    await distributeReferral(phone, d.amountUSDT);

    const poolSnap = await get(ref(db, "liquidityPool"));
    const pool = (poolSnap.val() || 0) + d.amountUSDT;
    await set(ref(db, "liquidityPool"), pool);

    await remove(ref(db, "investments/pending/" + phone));

    alert("Investment approved with updated price!");
}
  window.approveUpgrade = async(phone)=>{

    const snap = await get(ref(db,"investments/upgrade/"+phone))
    if(!snap.exists()) return alert("Upgrade not found")

    const d = snap.val()

    const userSnap = await get(ref(db,"users/"+phone))
    const u = userSnap.val()

    // 1. Current Price fetch karein (latest price lene ke liye)
    const currentPrice = await getPrice()

    // 2. Temple_DA ko approval ke waqt ke price par recalculate karein
    const newTemple_DAAmount = Number((d.amountUSDT / currentPrice).toFixed(2))

    // Max limit safety
    if((u.investment || 0) + d.amountUSDT > 250){
    alert("Upgrade exceeds maximum limit");
    // Queue clear karne ke liye isko remove karein
    await remove(ref(db,"investments/upgrade/"+phone));
    return;
}


    // 3. Purana Locked + Recalculated Naya Locked
    const newLocked = (u.locked || 0) + newTemple_DAAmount

    await update(ref(db,"users/"+phone),{
        investment: (u.investment || 0) + d.amountUSDT,
        locked: newLocked,
        lockDate: Date.now() // 30 days cycle reset
    })

    // History mein naya calculated amount save karein
    await push(ref(db,"investments/history/"+phone),{
        amountUSDT: d.amountUSDT,
        temple_DAAmount: newTemple_DAAmount,
        type: "upgrade",
        time: Date.now()
    })

    // Referral distribution ab currentPrice par distributeReferral() ke andar automatic sahi hoga
    await distributeReferral(phone, d.amountUSDT)

    // Upgrade request delete karein
    await remove(ref(db,"investments/upgrade/"+phone))

    alert("Upgrade approved & tokens calculated at current price!");
}
  window.rejectUpgrade = async(phone)=>{

await remove(ref(db,"investments/upgrade/"+phone))

alert("Upgrade request rejected")

}
window.approveWithdraw=async(phone)=>{

const snap=await get(ref(db,"withdrawals/pending/"+phone))
const d=snap.val()

const userSnap=await get(ref(db,"users/"+phone))
const u=userSnap.val()

if(u.balance<d.amount) return alert("Insufficient balance")

await update(ref(db,"users/"+phone),{
balance:u.balance-d.amount
})
  await push(ref(db,"withdrawals/history/"+phone),{
amount:d.amount,
wallet:d.wallet,
time:Date.now()
})

await remove(ref(db,"withdrawals/pending/"+phone))

alert("Withdrawal approved")
}

async function distributeReferral(phone,amount){

const levels=[10,5,2.5,1,1,1,0.9,0.8,0.7,0.6,0.5,0.4,0.3,0.2,0.1]

let current=phone

const price=await getPrice()
const tmpl=amount/price

for(let i=0;i<15;i++){

const s=await get(ref(db,"users/"+current))
if(!s.exists()) break

const referrer=s.val().referrer
if(!referrer) break

const rSnap=await get(ref(db,"users/"+referrer))
const r=rSnap.val()

const bonus=tmpl*(levels[i]/100)

await update(ref(db,"users/"+referrer),{
balance:Number((r.balance+bonus).toFixed(2))
})

current=referrer

}
}

function autoRelease(phone, u){

if(!u.lockDate || !u.locked || u.locked <= 0) return

const days=(Date.now()-u.lockDate)/(1000*60*60*24)

if(days>=30){

// Kitne 30-days ke cycles miss hue hain unko calculate karein (Safety for long inactivity)
const cycles = Math.floor(days / 30); 
if (cycles < 1) return;

let totalRelease = 0;
let currentLocked = u.locked;

for (let i = 0; i < cycles; i++) {
  const release = currentLocked * 0.05;
  totalRelease += release;
  currentLocked -= release;
  if (currentLocked < 0) { currentLocked = 0; break; }
}

const newBalance = Number(((u.balance || 0) + totalRelease).toFixed(2));
const newLocked = Number(currentLocked.toFixed(2));

// Naya object data prepare karein update ke liye
const updates = {
  balance: newBalance,
  locked: newLocked,
  lockDate: Date.now() // Cycle reset to current time
};

// Agar saare tokens release ho chuke hain, toh investment cycle reset karein
if(newLocked <= 0){
  updates.investment = 0;
  updates.lockDate = 0;
}

// Database update call
update(ref(db,"users/"+phone), updates).then(() => {
  console.log("Vesting auto-updated for: " + phone);
}).catch(err => console.error("Update error: ", err));

}
}


  window.releaseLocked = async (phone) => {

const snap = await get(ref(db, "users/" + phone));
if (!snap.exists()) return alert("User not found");

const u = snap.val();
if (!u.locked || u.locked <= 0) return alert("No locked tokens to release");

// release full locked tokens
const releasedAmount = u.locked;

await update(ref(db, "users/" + phone), {
balance: (u.balance || 0) + releasedAmount,
locked: 0,
lockDate: 0,

// ⭐⭐⭐ MAIN FIX ⭐⭐⭐
investment: 0
});

alert("Full cycle completed. User can invest again.");
};

  window.editUser = async(oldId)=>{

const newId = prompt("Enter new user ID")

if(!newId) return

const snap = await get(ref(db,"users/"+oldId))
if(!snap.exists()) return alert("User not found")

const data = snap.val()

// new id save
await set(ref(db,"users/"+newId),data)

// old id delete
await remove(ref(db,"users/"+oldId))

alert("User ID updated")

}

  function loadInvestHistory(phone){

onValue(ref(db,"investments/history/"+phone),snap=>{

snap.forEach(s=>{
const d=s.val()

// ⭐ show ONLY real investments
if(!d.type || d.type==="invest") list.push(d)

})

list=list.reverse().slice(0,25)

let html=""

list.forEach(d=>{

const date=new Date(d.time).toLocaleDateString()

html+=`
<div class="small">
${date} → ${d.amountUSDT} USDT
</div>
`

})

document.getElementById("investHistory").innerHTML=
html || "No investment yet"

})

}
