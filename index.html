<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMPL Pro Ecosystem</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:#fff;
}
.container{max-width:1100px;margin:auto;padding:20px;}
.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:15px;
margin-bottom:20px;
}
input,button{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:none;
font-family:Poppins;
}
button{
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
cursor:pointer;
}
.hide{display:none;}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}
</style>
</head>

<body>
<div class="container">

<h2>TMPL Pro Ecosystem</h2>

<!-- AUTH -->
<div id="auth-card" class="card">
<h3>Login / Register</h3>

<input id="auth-name" placeholder="Name">
<input id="auth-wallet" placeholder="Wallet">
<input id="auth-phone" placeholder="Phone">
<input id="auth-password" type="password" placeholder="Password">
<input id="auth-upline" placeholder="Referral (optional)">

<button id="auth-register">Register</button>
<button id="auth-login">Login</button>
</div>

<button id="show-admin-login" style="background:#ff4d4d">Admin Login</button>

<!-- DASHBOARD -->
<div id="dashboard-card" class="hide">

<h3>Dashboard</h3>

<div class="grid">

<div class="card"><b>Investment</b><p id="dashboard-investment">0</p></div>
<div class="card"><b>Locked</b><p id="dashboard-locked">0</p></div>
<div class="card"><b>Released</b><p id="dashboard-released">0</p></div>
<div class="card"><b>Withdrawable</b><p id="dashboard-withdrawable">0</p></div>
<div class="card"><b>Live Price</b><p id="dashboard-price">0</p></div>
<div class="card"><b>Liquidity</b><p id="dashboard-liquidity">0</p></div>
<div class="card"><b>Company Fund</b><p id="dashboard-company">0</p></div>

</div>

<h4>Invest</h4>
<input id="invest-amount" type="number" placeholder="USDT Amount">
<button id="invest-btn">Invest</button>

<h4>Withdrawal</h4>
<button id="withdraw-btn">Request Withdrawal</button>

</div>

<!-- ADMIN -->
<div id="admin-card" class="card hide">

<h3>Admin Panel</h3>

<input id="admin-password" type="password" placeholder="Admin Password">
<button id="admin-login-btn">Login</button>

<div id="admin-actions" class="hide">

<input id="admin-liveprice" type="number" placeholder="Live Price">
<button id="admin-update-price">Update Price</button>

<h4>Users</h4>
<div id="admin-users"></div>

</div>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue, runTransaction, push, remove }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyBZh-Wg8JK5x4kBCag8zxDXw-eVY_LZmUw",
authDomain:"tmpl-cd770.firebaseapp.com",
databaseURL:"https://tmpl-cd770-default-rtdb.firebaseio.com/",
projectId:"tmpl-cd770",
storageBucket:"tmpl-cd770.appspot.com",
messagingSenderId:"383728687521",
appId:"1:383728687521:web:b3ac6cd7fde979cb8b13e0"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let currentUser=null;
let livePrice=1;
const ADMIN_PASSWORD="Admin@123";

/* ---------- HELPERS ---------- */

const show=e=>e.classList.remove("hide");
const hide=e=>e.classList.add("hide");

/* ---------- REGISTER ---------- */

auth-register.onclick=async()=>{
const name=auth-name.value.trim();
const wallet=auth-wallet.value.trim();
const phone=auth-phone.value.trim();
const password=auth-password.value.trim();
const upline=auth-upline.value||null;

if(!name||!wallet||!phone||!password) return alert("Fill all");

const userRef=ref(db,'users/'+phone);
if((await get(userRef)).exists()) return alert("User exists");

await set(userRef,{
name,wallet,password,upline,
investment:0,
lockedTokens:0,
releasedTokens:0,
totalTokens:0,
lastReleaseDate:0
});

alert("Registered ✅");
};

/* ---------- LOGIN ---------- */

auth-login.onclick=async()=>{
const phone=auth-phone.value;
const pass=auth-password.value;

const snap=await get(ref(db,'users/'+phone));

if(!snap.exists()||snap.val().password!==pass)
return alert("Invalid");

currentUser=phone;
showDashboard();
};

/* ---------- DASHBOARD ---------- */

function showDashboard(){
hide(auth-card);
show(dashboard-card);

onValue(ref(db,'livePrice'),s=>{
if(s.exists()){
livePrice=s.val();
dashboard-price.innerText=livePrice+" USDT";
}
});

onValue(ref(db,'users/'+currentUser),s=>{
const d=s.val();
dashboard-investment.innerText=d.investment+" USDT";
dashboard-locked.innerText=d.lockedTokens.toFixed(4);
dashboard-released.innerText=d.releasedTokens.toFixed(4);
dashboard-withdrawable.innerText=(d.releasedTokens*livePrice).toFixed(2)+" USDT";
});

onValue(ref(db,'global'),s=>{
if(!s.exists()) return;
dashboard-liquidity.innerText=s.val().liquidityPool||0;
dashboard-company.innerText=s.val().companyFund||0;
});

setInterval(autoReleaseTokens,10000);
}

/* ---------- INVEST ---------- */

invest-btn.onclick=async()=>{

const amount=parseFloat(invest-amount.value);
if(!amount||amount<20) return alert("Min 20");

const tokens=amount/livePrice;

await runTransaction(ref(db,'users/'+currentUser),u=>{
if(!u) return u;
u.investment+=amount;
u.lockedTokens+=tokens;
u.totalTokens+=tokens;
u.lastReleaseDate=Date.now();
return u;
});

await runTransaction(ref(db,'global'),g=>{
if(!g) g={liquidityPool:0,companyFund:0};
g.liquidityPool+=amount*0.5;
g.companyFund+=amount*0.2;
return g;
});

alert("Investment Success ✅");
};

/* ---------- AUTO 5% RELEASE ---------- */

async function autoReleaseTokens(){

await runTransaction(ref(db,'users/'+currentUser),u=>{

if(!u||u.lockedTokens<=0) return u;

const monthMS=30*24*60*60*1000;
const now=Date.now();

if(now-u.lastReleaseDate>=monthMS){

let release=u.lockedTokens*0.05;

u.lockedTokens-=release;
u.releasedTokens+=release;
u.lastReleaseDate=now;

if(u.lockedTokens<0.0001) u.lockedTokens=0;
}

return u;
});
}

/* ---------- WITHDRAW ---------- */

withdraw-btn.onclick=async()=>{
const snap=await get(ref(db,'users/'+currentUser));
const amt=snap.val().releasedTokens*livePrice;

if(amt<=0) return alert("No balance");

await push(ref(db,'withdrawals'),{
user:currentUser,
amount:amt,
status:"pending",
time:Date.now()
});

alert("Withdrawal Requested");
};

/* ---------- ADMIN ---------- */

show-admin-login.onclick=()=>show(admin-card);

admin-login-btn.onclick=()=>{
if(admin-password.value!==ADMIN_PASSWORD)
return alert("Wrong Password");

hide(admin-password);
hide(admin-login-btn);
show(admin-actions);

loadUsers();
};

admin-update-price.onclick=()=>{
set(ref(db,'livePrice'),parseFloat(admin-liveprice.value));
alert("Price Updated");
};

function loadUsers(){

onValue(ref(db,'users'),snap=>{

admin-users.innerHTML="";

Object.entries(snap.val()).forEach(([id,u])=>{

const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<b>${u.name}</b><br>
Investment: ${u.investment}
<br>
<button onclick="deleteUser('${id}')">Delete</button>
`;

admin-users.appendChild(div);
});
});
}

window.deleteUser=async(id)=>{
await remove(ref(db,'users/'+id));
alert("Deleted");
};

</script>
</body>
</html>
