<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMPL Investment Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Auth Section */
        .auth-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .auth-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .auth-card h2 { text-align: center; margin-bottom: 30px; color: #333; font-size: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px 16px; border: 2px solid #e1e5e9; border-radius: 10px; font-size: 16px; transition: all 0.3s; }
        .form-group input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102,126,234,0.3); }
        .btn-secondary { background: #6c757d; }
        .error { color: #dc3545; font-size: 14px; margin-top: 5px; display: none; }
        .success { color: #28a745; font-size: 14px; margin-top: 5px; display: none; }
        
        /* Admin Login Toggle */
        .admin-toggle { text-align: center; margin-top: 20px; color: #666; cursor: pointer; text-decoration: underline; }
        
        /* Loading */
        .loading { display: none; text-align: center; color: #666; margin-top: 10px; }
    </style>
</head>
<body>
    <!-- Auth Container -->
    <div id="authContainer" class="auth-container">
        <div class="auth-card">
            <h2 id="authTitle">User Login</h2>
            
            <!-- Admin Login -->
            <div id="adminLogin" style="display: none;">
                <div class="form-group">
                    <label>Admin Username</label>
                    <input type="text" id="adminUsername" placeholder="admin">
                </div>
                <div class="form-group">
                    <label>Admin Password</label>
                    <input type="password" id="adminPassword" placeholder="admin123">
                </div>
                <button class="btn" onclick="loginAdmin()">Admin Login</button>
            </div>
            
            <!-- User Login -->
            <div id="userLogin">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="loginUsername" placeholder="Enter username">
                    <div class="error" id="loginError"></div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter password">
                    <div class="error" id="loginError2"></div>
                </div>
                <button class="btn" onclick="loginUser()">Login</button>
            </div>
            
            <div class="admin-toggle" onclick="toggleAuthMode()">
                <span id="toggleText">Try Admin Login</span>
            </div>
            
            <div class="loading" id="loginLoading">Logging in...</div>
        </div>
    </div>

    <!-- Main App (Hidden initially) -->
    <div id="mainApp" style="display: none;">
        <!-- Dashboard will load here in Part 2 --><script type="module">
    // === FIREBASE CONFIG (MANDATORY - EXACT) ===
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set, get, child, update, onValue, push, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
    
    const firebaseConfig = {  
        apiKey: "AIzaSyBZh-Wg8JK5x4kBCag8zxDXw-eVY_LZmUw",  
        authDomain: "tmpl-cd770.firebaseapp.com",  
        databaseURL: "https://tmpl-cd770-default-rtdb.firebaseio.com/",  
        projectId: "tmpl-cd770",  
        storageBucket: "tmpl-cd770.firebasestorage.app",  
        messagingSenderId: "383728687521",  
        appId: "1:383728687521:web:b3ac6cd7fde979cb8b13e0"  
    };
    
    const app = initializeApp(firebaseConfig);  
    const db = getDatabase(app);
    
    // === GLOBAL STATE ===
    let currentUser = null;
    let isAdmin = false;
    const ADMIN_CREDENTIALS = { username: 'admin', password: 'admin123' };
    
    // === UTILITY FUNCTIONS ===
    function showError(elementId, message) {
        const errorEl = document.getElementById(elementId);
        errorEl.textContent = message;
        errorEl.style.display = 'block';
    }
    
    function hideError(elementId) {
        document.getElementById(elementId).style.display = 'none';
    }
    
    function showLoading(show = true) {
        document.getElementById('loginLoading').style.display = show ? 'block' : 'none';
    }
    
    function showSection(sectionId) {
        document.querySelectorAll('#mainApp > div').forEach(div => div.style.display = 'none');
        document.getElementById(sectionId).style.display = 'block';
    }
    
    // === ADMIN AUTH ===
    window.loginAdmin = async function() {
        const username = document.getElementById('adminUsername').value.trim();
        const password = document.getElementById('adminPassword').value.trim();
        
        if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
            isAdmin = true;
            currentUser = { username: 'admin', name: 'Administrator', isAdmin: true };
            showSection('adminPanel');
            renderAdminPanel();
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('authContainer').style.display = 'none';
        } else {
            alert('Invalid admin credentials!');
        }
    };
    
    // === USER AUTH ===
    window.loginUser = async function() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        
        if (!username || !password) {
            showError('loginError', 'Please enter both fields');
            return;
        }
        
        showLoading(true);
        hideError('loginError');
        hideError('loginError2');
        
        try {
            const usersRef = ref(db, 'users');
            const userQuery = query(usersRef, orderByChild('username'), equalTo(username));
            const snapshot = await get(userQuery);
            
            if (snapshot.exists()) {
                const userData = Object.values(snapshot.val())[0];
                if (userData.password === password) {
                    currentUser = userData;
                    isAdmin = false;
                    document.getElementById('mainApp').style.display = 'block';
                    document.getElementById('authContainer').style.display = 'none';
                    renderUserDashboard();
                } else {
                    showError('loginError2', 'Invalid password');
                }
            } else {
                showError('loginError', 'User not found');
            }
        } catch (error) {
            showError('loginError', 'Login failed. Check connection.');
            console.error('Login error:', error);
        } finally {
            showLoading(false);
        }
    };
    
    window.toggleAuthMode = function() {
        const adminLogin = document.getElementById('adminLogin');
        const userLogin = document.getElementById('userLogin');
        const toggleText = document.getElementById('toggleText');
        
        if (adminLogin.style.display === 'none') {
            adminLogin.style.display = 'block';
            userLogin.style.display = 'none';
            toggleText.textContent = 'User Login';
        } else {
            adminLogin.style.display = 'none';
            userLogin.style.display = 'block';
            toggleText.textContent = 'Try Admin Login';
        }
    };
    
    // Logout
    window.logout = function() {
        currentUser = null;
        isAdmin = false;
        document.getElementById('mainApp').style.display = 'none';
        document.getElementById('authContainer').style.display = 'flex';
        document.getElementById('loginUsername').value = '';
        document.getElementById('loginPassword').value = '';
        document.getElementById('adminUsername').value = '';
        document.getElementById('adminPassword').value = '';
        hideError('loginError');
        hideError('loginError2');
    };
    <!-- USER DASHBOARD HTML -->
    <div id="userDashboard" style="display: none;">
        <div class="container">
            <header style="background: white; padding: 20px; border-radius: 15px; margin-bottom: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center;">
                <h1 style="color: #333; font-size: 24px;">Welcome <span id="userName"></span></h1>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <span id="regDate" style="color: #666; font-size: 14px;"></span>
                    <button class="btn btn-secondary" onclick="logout()" style="padding: 8px 16px; font-size: 14px;">Logout</button>
                </div>
            </header>
            
            <!-- Balance Cards -->
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px;">
                <div class="card" style="background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center;">
                    <h3 style="color: #666; margin-bottom: 10px;">TMPL Price</h3>
                    <div id="tmplPrice" style="font-size: 28px; font-weight: bold; color: #667eea;">$0.100</div>
                </div>
                <div class="card">
                    <h3 style="color: #666; margin-bottom: 10px;">USDT Balance</h3>
                    <div id="usdtBalance" style="font-size: 28px; font-weight: bold; color: #28a745;">0.00</div>
                </div>
                <div class="card">
                    <h3 style="color: #666; margin-bottom: 10px;">TMPL Balance</h3>
                    <div id="tmplBalance" style="font-size: 28px; font-weight: bold; color: #667eea;">0</div>
                </div>
                <div class="card">
                    <h3 style="color: #666; margin-bottom: 10px;">Locked TMPL</h3>
                    <div id="lockedTmpl" style="font-size: 28px; font-weight: bold; color: #ff6b6b;">0</div>
                </div>
            </div>
            
            <!-- Action Buttons -->
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;">
                <button class="btn" onclick="showBuyModal()" style="height: 60px; font-size: 18px;">Buy TMPL</button>

            </div>
            
            <!-- Investments Table -->

                <h3 style="color: white; margin-bottom: 20px; font-size: 20px;">My Investments</h3>

                    <table style="width: 100%; border-collapse: collapse;">
                        <thead style="background: #667eea; color: white;">
                            <tr><th style="padding: 15px; text-align: left;">USDT</th><th>TMPL</th><th>Status</th><th>Date</th></tr>
                        </thead>
                        <tbody id="investmentsBody"></tbody>
                    </table>
                </div>
            </div>
            
            <!-- Locked TMPL Table -->
            <div class="section">
                <h3 style="color: white; margin-bottom: 20px; font-size: 20px;">Locked TMPL</h3>
                <div id="lockedTable" style="background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead style="background: #ff6b6b; color: white;">
                            <tr><th style="padding: 15px; text-align: left;">Amount</th><th>Unlock Date</th><th>Status</th></tr>
                        </thead>
                        <tbody id="lockedBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    // === USER DASHBOARD ===
    function renderUserDashboard() {
        document.getElementById('userName').textContent = currentUser.name;
        document.getElementById('regDate').textContent = `Reg: ${currentUser.registrationDate}`;
        loadUserData();
        showSection('userDashboard');
        setupRealtimePrice();
    }
    
    async function loadUserData() {
        try {
            const userRef = ref(db, `users/${currentUser.userId}`);
            const snapshot = await get(userRef);
            const userData = snapshot.val();
            
            document.getElementById('usdtBalance').textContent = (userData.usdtBalance || 0).toFixed(2);
            document.getElementById('tmplBalance').textContent = userData.tmplBalance || 0;
            document.getElementById('lockedTmpl').textContent = (userData.lockedTmpl || []).reduce((sum, lock) => sum + lock.amount, 0);
            
            renderInvestmentsTable(userData.investments || []);
            renderLockedTable(userData.lockedTmpl || []);
            processLockedTmplReleases();
        } catch (error) {
            console.error('Load user data error:', error);
        }
    }
    
    // Real-time TMPL Price
    function setupRealtimePrice() {
        const priceRef = ref(db, 'global/tmplPrice');
        onValue(priceRef, (snapshot) => {
            const price = snapshot.val() || 0.1;
            document.getElementById('tmplPrice').textContent = `$${price.toFixed(3)}`;
        });
    }
    
    // === MODALS ===
    function showBuyModal() {
        const modal = `
            <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; justify-content: center; align-items: center;">
                <div style="background: white; padding: 30px; border-radius: 15px; max-width: 400px; width: 90%;">
                    <h3 style="margin-bottom: 20px;">Buy TMPL</h3>
                    <div class="form-group">
                        <label>USDT Amount</label>
                        <input type="number" id="buyUsdt" placeholder="100" step="0.01" min="10">
                    </div>
                    <div style="margin: 15px 0;">
                        <strong>TMPL Amount: <span id="buyTmplAmount">0</span></strong>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn" onclick="confirmBuy()">Confirm Buy</button>
                        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modal);
        setupBuyCalculator();
    }
    
    function setupBuyCalculator() {
        const input = document.getElementById('buyUsdt');
        input.addEventListener('input', () => {
            const priceRef = ref(db, 'global/tmplPrice');
            get(priceRef).then(snapshot => {
                const price = snapshot.val() || 0.1;
                const tmpl = input.value / price;
                document.getElementById('buyTmplAmount').textContent = tmpl.toFixed(2);
            });
        });
    }
    
    window.confirmBuy = async function() {
        const usdtAmount = parseFloat(document.getElementById('buyUsdt').value);
        if (usdtAmount < 10) return alert('Minimum 10 USDT');
        
        const priceRef = ref(db, 'global/tmplPrice');
        const priceSnapshot = await get(priceRef);
        const tmplPrice = priceSnapshot.val() || 0.1;
        const tmplAmount = usdtAmount / tmplPrice;
        
        const investmentId = push(ref(db, 'investments')).key;
        const investmentData = {
            userId: currentUser.userId,
            username: currentUser.username,
            usdtAmount,
            tmplAmount,
            status: 'pending',
            createdAt: new Date().toISOString()
        };
        
        await set(ref(db, `investments/${investmentId}`), investmentData);
        closeModal();
        loadUserData();
        alert('Investment request submitted! Awaiting admin approval.');
    };
    
    window.closeModal = function() {
        document.querySelector('#mainApp .modal')?.remove();
    };
    
    <script type="module">
    // === PART 5: COMPLETE APP LOGIC === (Add after Part 4)
    
    // Continue from Part 4 - Add these functions:
    
    window.showWithdrawModal = function() {
        const modal = `
            <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; justify-content: center; align-items: center;" class="modal">
                <div style="background: white; padding: 30px; border-radius: 15px; max-width: 400px; width: 90%;">
                    <h3 style="margin-bottom: 20px;">Request Withdrawal</h3>
                    <div class="form-group">
                        <label>TMPL Amount</label>
                        <input type="number" id="withdrawTmpl" placeholder="100" step="1" min="50">
                        <div style="margin-top: 5px; font-size: 14px; color: #666;">Min: 50 TMPL (~$5 USDT)</div>
                    </div>
                    <div class="form-group">
                        <label>BEP20 Wallet</label>
                        <input type="text" id="withdrawWallet" placeholder="0x...">
                    </div>
                    <div style="margin: 15px 0;">
                        <strong>USDT Value: $<span id="withdrawUsdtValue">0</span></strong>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn" onclick="confirmWithdrawal()">Request</button>
                        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modal);
        setupWithdrawCalculator();
    };
    
    function setupWithdrawCalculator() {
        const tmplInput = document.getElementById('withdrawTmpl');
        tmplInput.addEventListener('input', () => {
            get(ref(db, 'global/tmplPrice')).then(snapshot => {
                const price = snapshot.val() || 0.1;
                const usdtValue = tmplInput.value * price;
                document.getElementById('withdrawUsdtValue').textContent = usdtValue.toFixed(2);
            });
        });
    }
    
    window.confirmWithdrawal = async function() {
        const tmplAmount = parseFloat(document.getElementById('withdrawTmpl').value);
        const wallet = document.getElementById('withdrawWallet').value.trim();
        
        if (tmplAmount < 50) return alert('Minimum 50 TMPL');
        if (!validateBep20Address(wallet)) return alert('Invalid BEP20 address');
        
        const priceSnapshot = await get(ref(db, 'global/tmplPrice'));
        const usdtValue = tmplAmount * (priceSnapshot.val() || 0.1);
        if (usdtValue < 5) return alert('Minimum $5 USDT value');
        
        const withdrawalId = push(ref(db, 'withdrawals')).key;
        const withdrawalData = {
            userId: currentUser.userId,
            username: currentUser.username,
            tmplAmount,
            usdtValue,
            walletAddress: wallet,
            status: 'pending',
            createdAt: new Date().toISOString()
        };
        
        await set(ref(db, `withdrawals/${withdrawalId}`), withdrawalData);
        closeModal();
        loadUserData();
        alert('Withdrawal request submitted!');
    };
    
    window.showReferralModal = function() {
        const modal = `
            <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; justify-content: center; align-items: center;" class="modal">
                <div style="background: white; padding: 30px; border-radius: 15px; max-width: 400px; width: 90%;">
                    <h3>Referral Program</h3>
                    <div style="margin: 20px 0;">
                        <strong>Your Link:</strong><br>
                        <input id="refLink" readonly style="width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px;" value="${window.location.origin}/?ref=${currentUser.username}">
                    </div>
                    <div style="margin: 20px 0;">
                        <strong>Sponsor ID:</strong> ${currentUser.sponsorId || 'None'}
                    </div>
                    <button class="btn" onclick="navigator.clipboard.writeText(document.getElementById('refLink').value); alert('Link copied!')">Copy Link</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modal);
    };
    
    function renderInvestmentsTable(investments) {
        const tbody = document.getElementById('investmentsBody');
        tbody.innerHTML = investments.map(inv => `
            <tr style="border-bottom: 1px solid #eee;">
                <td style="padding: 15px;">$${inv.usdtAmount?.toFixed(2) || 0}</td>
                <td style="padding: 15px;">${inv.tmplAmount?.toFixed(2) || 0}</td>
                <td style="padding: 15px;">
                    <span style="padding: 5px 10px; border-radius: 20px; font-size: 12px; 
                        ${inv.status === 'approved' ? 'background: #d4edda; color: #155724;' : 
                          inv.status === 'rejected' ? 'background: #f8d7da; color: #721c24;' : 
                          'background: #fff3cd; color: #856404;'}">
                        ${inv.status}
                    </span>
                </td>
                <td style="padding: 15px; font-size: 14px; color: #666;">${new Date(inv.createdAt).toLocaleDateString()}</td>
            </tr>
        `).join('') || '<tr><td colspan="4" style="padding: 40px; text-align: center; color: #666;">No investments</td></tr>';
    }
    
    function renderLockedTable(locks) {
        const tbody = document.getElementById('lockedBody');
        tbody.innerHTML = locks.map(lock => `
            <tr style="border-bottom: 1px solid #eee;">
                <td style="padding: 15px;">${lock.amount?.toFixed(2) || 0}</td>
                <td style="padding: 15px;">${lock.unlockDate ? new Date(lock.unlockDate).toLocaleDateString() : 'N/A'}</td>
                <td style="padding: 15px;">
                    <span style="padding: 5px 10px; border-radius: 20px; 
                        ${lock.released ? 'background: #d4edda; color: #155724;' : 'background: #ff6b6b; color: white;'}">
                        ${lock.released ? 'Released' : 'Locked'}
                    </span>
                </td>
            </tr>
        `).join('') || '<tr><td colspan="3" style="padding: 40px; text-align: center; color: #666;">No locked TMPL</td></tr>';
    }
    
    // === LOCKED TMPL AUTO-RELEASE ===
    async function processLockedTmplReleases() {
        const userRef = ref(db, `users/${currentUser.userId}`);
        const snapshot = await get(userRef);
        const userData = snapshot.val();
        const locks = userData.lockedTmpl || [];
        
        const updatedLocks = locks.map(lock => {
            if (!lock.released && new Date() > new Date(lock.unlockDate)) {
                return { ...lock, released: true };
            }
            return lock;
        });
        
        const unlockedAmount = locks.filter(lock => !lock.released && new Date() > new Date(lock.unlockDate))
            .reduce((sum, lock) => sum + lock.amount, 0);
        
        if (unlockedAmount > 0) {
            await update(userRef, {
                tmplBalance: (userData.tmplBalance || 0) + unlockedAmount,
                lockedTmpl: updatedLocks
            });
            loadUserData();
        }
    }
    
    // === BEP20 VALIDATION ===
    window.validateBep20Address = function(address) {
        return /^0x[a-fA-F0-9]{40}$/.test(address);
    };
    
    // === ADMIN PANEL ===
    function renderAdminPanel() {
        showSection('adminPanel');
        loadAdminData();
        setupAdminRealtime();
    }

                    <div id="totalUsers" style="font-size: 32px; font-weight: bold;">0</div>

                </div>

                    <h3>Distribution Pool</h3>
                    <div id="distributionPool">$0</div>
                </div>
                <div class="card" style="background: linear-gradient(135deg, #6f42c1, #6f42c1); color: white;">
                    <h3>Company Fund</h3>
                    <div id="companyFund">$0</div>
                </div>
            </div>
            
            <!-- Admin Tabs -->
            <div style="background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 30px;">
                <div style="display: flex; background: #f8f9fa;">
                    <button class="admin-tab btn" data-tab="price" style="flex: 1; border-radius: 0; border: none; padding: 15px;">Live Price</button>
                    <button class="admin-tab btn" data-tab="investments" style="flex: 1; border-radius: 0; border: none; padding: 15px;">Investments</button>
                    <button class="admin-tab btn" data-tab="withdrawals" style="flex: 1; border-radius: 0; border: none; padding: 15px;">Withdrawals</button>
                    <button class="admin-tab btn" data-tab="users" style="flex: 1; border-radius: 0; border: none; padding: 15px;">Users</button>
                </div>
                <div id="priceTab" class="admin-tab-content">
                    <div style="padding: 30px;">
                        <h3>TMPL Price Control</h3>
                        <div class="form-group" style="max-width: 300px;">
                            <label>Current Price: $<span id="currentAdminPrice">$0.100</span></label>
                            <input type="number" id="newPrice" step="0.001" min="0.01" style="margin-top: 10px;">
                        </div>
                        <button class="btn" onclick="updateTmplPrice()">Update Price</button>
                    </div>
                </div>
                <div id="investmentsTab" class="admin-tab-content" style="display: none;">
                    <div id="adminInvestmentsTable" style="padding: 30px;">
                        <!-- Investments table loads here -->
                    </div>
                </div>
                <div id="withdrawalsTab" class="admin-tab-content" style="display: none;">
                    <div id="adminWithdrawalsTable" style="padding: 30px;">
                        <!-- Withdrawals table loads here -->
                    </div>
                </div>
                <div id="usersTab" class="admin-tab-content" style="display: none;">
                    <div id="adminUsersTable" style="padding: 30px;">
                        <!-- Users table loads here -->
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- ADMIN FUNCTIONS -->
    async function loadAdminData() {
        // Total users
        const usersSnapshot = await get(ref(db, 'users'));
        document.getElementById('totalUsers').textContent = Object.keys(usersSnapshot.val() || {}).length;
        
        // Global pools
        const globalRef = ref(db, 'global');
        onValue(globalRef, (snapshot) => {
            const global = snapshot.val() || {};
            document.getElementById('liquidityPool').textContent = `$${global.liquidityPoolUsdt || 0}`;
            document.getElementById('distributionPool').textContent = `$${global.distributionPoolUsdt || 0}`;
            document.getElementById('companyFund').textContent = `$${global.companyFundUsdt || 0}`;
            document.getElementById('currentAdminPrice').textContent = `$${global.tmplPrice || 0.1}`;
        });
    }
    
    function setupAdminRealtime() {
        document.querySelectorAll('.admin-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.admin-tab-content').forEach(c => c.style.display = 'none');
                this.classList.add('active');
                document.getElementById(this.dataset.tab + 'Tab').style.display = 'block';
                if (this.dataset.tab === 'investments') loadAdminInvestments();
                if (this.dataset.tab === 'withdrawals') loadAdminWithdrawals();
                if (this.dataset.tab === 'users') loadAdminUsers();
            });
        });
    }
    
    window.updateTmplPrice = async function() {
        const newPrice = parseFloat(document.getElementById('newPrice').value);
        if (newPrice && newPrice > 0) {
            await set(ref(db, 'global/tmplPrice'), newPrice);
            alert('Price updated successfully!');
        }
    };
    
    window.approveInvestment = async function(investmentId) {
        const investmentRef = ref(db, `investments/${investmentId}`);
        const snapshot = await get(investmentRef);
        const investment = snapshot.val();
        
        // Distribute USDT
        const globalRef = ref(db, 'global');
        const globalSnapshot = await get(globalRef);
        const global = globalSnapshot.val() || {};
        
        await update(globalRef, {
            liquidityPoolUsdt: (global.liquidityPoolUsdt || 0) + investment.usdtAmount * 0.5,
            distributionPoolUsdt: (global.distributionPoolUsdt || 0) + investment.usdtAmount * 0.3,
            companyFundUsdt: (global.companyFundUsdt || 0) + investment.usdtAmount * 0.2
        });
        
        // Add to user locked TMPL
        const userRef = ref(db, `users/${investment.userId}`);
        const userSnapshot = await get(userRef);
        const user = userSnapshot.val();
        const lock = {
            amount: investment.tmplAmount,
            unlockDate: new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString(),
            released: false
        };
        
        await update(userRef, {
            lockedTmpl: [...(user.lockedTmpl || []), lock]
        });
        
        // Update investment status
        await update(investmentRef, { status: 'approved' });
        loadAdminInvestments();
        alert('Investment approved!');
    };
    
    // Additional admin functions (similar pattern for withdrawals/users)
    async function loadAdminInvestments() {
        const snapshot = await get(ref(db, 'investments'));
        const investments = Object.entries(snapshot.val() || {}).map(([id, data]) => ({ id, ...data }));
        document.getElementById('adminInvestmentsTable').innerHTML = `
            <table style="width: 100%; border-collapse: collapse;">
                <thead style="background: #667eea; color: white;">
                    <tr><th style="padding: 15px;">User</th><th>USDT</th><th>TMPL</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody>
                    ${investments.map(inv => `
                        <tr style="border-bottom: 1px solid #eee;">
                            <td style="padding: 15px;">${inv.username}</td>
                            <td>$${inv.usdtAmount?.toFixed(2)}</td>
                            <td>${inv.tmplAmount?.toFixed(2)}</td>
                            <td>
                                <span style="padding: 5px 10px; border-radius: 20px; font-size: 12px; 
                                    ${inv.status === 'approved' ? 'background: #d4edda; color: #155724;' : 
                                      inv.status === 'rejected' ? 'background: #f8d7da; color: #721c24;' : 
                                      'background: #fff3cd; color: #856404;'}">
                                    ${inv.status}
                                </span>
                            </td>
                            <td style="padding: 15px;">
                                ${inv.status === 'pending' ? 
                                    `<button class="btn" style="padding: 5px 15px; font-size: 12px;" onclick="approveInvestment('${inv.id}')">Approve</button>` : ''}
                            </td>
                        </tr>
                    `).join('') || '<tr><td colspan="5" style="padding: 40px; text-align: center;">No pending investments</td></tr>'}
                </tbody>
            </table>
        `;
    }
    
    // Initialize app
    document.addEventListener('DOMContentLoaded', function() {
        // Check referral from URL
        const urlParams = new URLSearchParams(window.location.search);
        const refId = urlParams.get('ref');
        if (refId) {
            document.getElementById('sponsorId') && (document.getElementById('sponsorId').value = refId);
        }
        
        // Set default TMPL price if not exists
        get(ref(db, 'global/tmplPrice')).then(snapshot => {
            if (!snapshot.exists()) {
                set(ref(db, 'global/tmplPrice'), 0.1);
            }
        });
    });
    
    // Additional CSS for tabs
    const style = document.createElement('style');
    style.textContent = `
        .admin-tab.active { background: #667eea !important; }
        .section { margin-bottom: 30px; }
        @media (max-width: 768px) {
            .container { padding: 10px; }
            .auth-card { margin: 10px; padding: 20px; }
        }
    `;
    document.head.appendChild(style);
</script>
    </div>
</body>
</html>
