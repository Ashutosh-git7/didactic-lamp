<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TMPL PRO Ecosystem</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:Poppins;background:#020617;color:white;}
.header{background:linear-gradient(90deg,#06b6d4,#22c55e);padding:15px;text-align:center;font-weight:bold;font-size:22px;}
.container{padding:15px;}
.card{background:#0f172a;border-radius:12px;padding:15px;margin-bottom:15px;box-shadow:0 0 15px #000;}
input,select{width:100%;padding:12px;margin:6px 0;border-radius:8px;border:none;background:#020617;color:white;}
button{width:100%;padding:12px;border:none;border-radius:8px;background:linear-gradient(90deg,#22c55e,#06b6d4);color:white;font-weight:bold;margin-top:8px;cursor:pointer;}
button:hover{opacity:0.9;}
.hidden{display:none;}
.balance{font-size:28px;color:#22c55e;font-weight:bold;text-align:center;}
.small{font-size:13px;opacity:.7;}
.team-member{background:#1e293b;padding:10px;margin:5px 0;border-radius:8px;}
h3,h4{margin-top:0;}
.tree{margin-left:20px;}
.toggle{cursor:pointer;color:#22c55e;font-weight:bold;}
</style>
</head>
<body>

<div class="header">🪙 TMPL PRO Dashboard</div>
<div class="container">

<!-- REGISTER -->
<div id="register" class="card">
<h3>Create Account</h3>
<input id="rname" placeholder="Full Name">
<input id="rmobile" placeholder="Mobile Number">
<input id="rpassword" placeholder="Password" type="password">
<input id="rwallet" placeholder="USDT Wallet Address">
<input id="rref" placeholder="Referral Code (optional)">
<button onclick="register()">Register</button>
</div>

<!-- LOGIN -->
<div id="login" class="card">
<h3>Login</h3>
<input id="lmobile" placeholder="Mobile Number">
<input id="lpassword" placeholder="Password" type="password">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<div class="card">
<h3>Account Info</h3>
<p id="userinfo"></p>
<p>USDT Deposit Address: <b>0x49F7A836A32C1aCF04d4d20Fa87A14C7a19aB74B</b></p>
</div>

<div class="card">
<h3>Balance</h3>
<div class="balance" id="balance">0 TMPL</div>
<p class="small">Reward Balance</p>
<div class="small">Pending Investment: <span id="pending">0</span> TMPL</div>
<div class="small">Referral Income: <span id="refincome">0</span> TMPL</div>
<div class="small">Next Monthly 5% Income in: <span id="incomeCountdown">0</span> days</div>
</div>

<div class="card">
<h3>Invest USDT</h3>
<input id="amount" placeholder="Enter Amount">
<button onclick="invest()">Submit Investment</button>
</div>

<div class="card">
<h3>Team</h3>
<div id="team"></div>
</div>

<div class="card">
<h3>Withdraw</h3>
<input id="withdrawAmount" placeholder="Enter Amount to Withdraw">
<button onclick="requestWithdraw()">Request Withdrawal</button>
</div>

<button onclick="logout()">Logout</button>
</div>

<!-- ADMIN PANEL -->
<div class="card">
<h3>Admin Panel</h3>
<input id="adminpass" placeholder="Admin Password" type="password">
<button onclick="adminLogin()">Open Admin</button>
<div id="admin" class="hidden"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, child, update, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyBZh-Wg8JK5x4kBCag8zxDXw-eVY_LZmUw",
authDomain:"tmpl-cd770.firebaseapp.com",
projectId:"tmpl-cd770",
storageBucket:"tmpl-cd770.firebasestorage.app",
messagingSenderId:"383728687521",
appId:"1:383728687521:web:b3ac6cd7fde979cb8b13e0"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);
let currentUser=null;

/* Referral percentages 15 levels (Level1=10%, then decreasing) */
const referralPercents=[0.10,0.05,0.03,0.02,0.02,0.01,0.01,0.01,0.01,0.01,0.01,0.01,0.01,0.01,0.01];

/* REGISTER */
window.register=async function(){
let mobile=rmobile.value.trim(),name=rname.value.trim(),password=rpassword.value.trim(),wallet=rwallet.value.trim(),refcode=rref.value.trim();
if(!mobile||!name||!password||!wallet){ alert("All fields required!"); return; }
const snap=await get(child(ref(db),'users/'+mobile));
if(snap.exists()){ alert("User already exists!"); return; }
await set(ref(db,'users/'+mobile),{
name,password,wallet,ref:refcode||"",
balance:0,investment:0,pendingInvestment:0,withdrawRequest:0,
referralIncome:0,totalEarned:0,lastIncomeDate:Date.now(),
liquidityPool:0
});
alert("Account Created ✅"); rmobile.value=""; rname.value=""; rpassword.value=""; rwallet.value=""; rref.value="";
}

/* LOGIN */
window.login=async function(){
let mobile=lmobile.value.trim(),password=lpassword.value.trim();
const snap=await get(child(ref(db),'users/'+mobile));
if(snap.exists()){
let data=snap.val();
if(data.password!==password){ alert("Wrong Password"); return; }
currentUser=mobile;
dashboard.classList.remove("hidden"); register.style.display="none"; login.style.display="none";
await loadUser(); await loadTeamTree();
}else{ alert("User Not Found"); }
}

/* LOAD USER WITH MONTHLY INCOME & COUNTDOWN */
async function loadUser(){
const snap=await get(child(ref(db),'users/'+currentUser));
let d=snap.val();
let now=Date.now();
let months=Math.floor((now-d.lastIncomeDate)/(30*24*60*60*1000));
let newIncome=0;
if(months>0 && d.totalEarned<(d.investment*2)){
  newIncome=(d.investment*0.05)*months;
  if(d.totalEarned+newIncome>d.investment*2) newIncome=(d.investment*2)-d.totalEarned;
  await update(ref(db,'users/'+currentUser),{
    balance:(d.balance||0)+newIncome,
    totalEarned:(d.totalEarned||0)+newIncome,
    lastIncomeDate:now
  });
  d.balance=(d.balance||0)+newIncome;
  d.totalEarned=(d.totalEarned||0)+newIncome;
  d.lastIncomeDate=now;
}
userinfo.innerHTML=`Name: ${d.name}<br>Mobile: ${currentUser}<br>Wallet: ${d.wallet}`;
balance.innerHTML=d.balance+" TMPL";
pending.innerText=d.pendingInvestment||0;
refincome.innerText=d.referralIncome||0;
let nextIncome=Math.ceil(((d.lastIncomeDate+30*24*60*60*1000)-now)/(24*60*60*1000));
incomeCountdown.innerText=nextIncome>0?nextIncome:0;
}

/* INVESTMENT */
window.invest=async function(){
let amt=parseFloat(amount.value);
if(isNaN(amt)||amt<=0){ alert("Enter valid amount"); return; }
const userRef=ref(db,'users/'+currentUser);
await runTransaction(userRef, (user)=>{
if(user){
user.pendingInvestment=(user.pendingInvestment||0)+amt;
user.liquidityPool=(user.liquidityPool||0)+(amt*0.5);
}
return user;
});
alert("Investment Submitted (Admin Approval)"); amount.value=""; loadUser();
}

/* TEAM TREE (collapsible) */
async function loadTeamTree(){
team.innerHTML="";
async function buildTree(userId,level){
const snap=await get(ref(db,'users'));
snap.forEach(u=>{
let d=u.val();
if(d.ref==userId){
let div=document.createElement('div');
div.className='team-member tree';
div.innerHTML=`<span class="toggle" onclick="this.nextSibling.classList.toggle('hidden')">Level ${level}: ${d.name} (${u.key}) - Invest: ${d.investment} TMPL</span>
<div class="hidden"></div>`;
team.appendChild(div);
buildTree(u.key,level+1);
}
});
}
buildTree(currentUser,1);
}

/* WITHDRAW */
window.requestWithdraw=async function(){
let amt=parseFloat(withdrawAmount.value);
if(isNaN(amt)||amt<=0){ alert("Enter valid amount"); return; }
const userRef=ref(db,'users/'+currentUser);
await runTransaction(userRef, (user)=>{
if(user){
if(amt>user.balance){ alert("Insufficient Balance"); return user; }
user.withdrawRequest=(user.withdrawRequest||0)+amt;
}
return user;
});
alert("Withdrawal Requested ✅"); withdrawAmount.value=""; loadUser();
}

/* ADMIN PANEL */
window.adminLogin=async function(){
if(adminpass.value!=="Jaihanuman@7"){ alert("Wrong Password"); return; }
admin.classList.remove("hidden");
let snap=await get(ref(db,'users'));
let html="<h4>All Users</h4>";
snap.forEach(u=>{
let d=u.val();
html+=`<div class='card'>
<b>${d.name} (${u.key})</b><br>
Wallet: ${d.wallet}<br>
Balance: ${d.balance} TMPL<br>
Investment: ${d.investment} TMPL<br>
Pending: ${d.pendingInvestment||0} TMPL<br>
Referral Income: ${d.referralIncome||0} TMPL<br>
Withdrawal Request: ${d.withdrawRequest||0} TMPL<br>
<button onclick="approve('${u.key}')">Approve Investment</button>
<button onclick="approveWithdraw('${u.key}')">Approve Withdrawal</button>
</div>`;
});
admin.innerHTML=html;
}

/* APPROVE INVESTMENT WITH 15-LEVEL REFERRAL */
window.approve=async function(uid){
const userRef=ref(db,'users/'+uid);
const snap=await get(userRef);
let d=snap.val();
let amt=d.pendingInvestment||0;
if(amt>0){
await update(userRef,{investment:(d.investment||0)+amt,pendingInvestment:0});
// Referral distribution 15 levels
let parent=d.ref;
for(let lvl=0; lvl<15; lvl++){
if(!parent) break;
const parentRef=ref(db,'users/'+parent);
await runTransaction(parentRef, (pdata)=>{
if(pdata){
let reward=amt*referralPercents[lvl];
let maxReward=(pdata.investment*2)-(pdata.totalEarned||0);
if(reward>maxReward) reward=maxReward;
pdata.balance=(pdata.balance||0)+reward;
pdata.referralIncome=(pdata.referralIncome||0)+reward;
pdata.totalEarned=(pdata.totalEarned||0)+reward;
parent=pdata.ref;
}
return pdata;
});
}
alert("Investment Approved & Referral Distributed ✅"); adminLogin();
}else alert("No Pending Investment");
}

/* APPROVE WITHDRAWAL */
window.approveWithdraw=async function(uid){
const userRef=ref(db,'users/'+uid);
await runTransaction(userRef, (user)=>{
if(user){
let amt=user.withdrawRequest||0;
if(amt>0){
if(amt>user.balance){ alert("Insufficient Balance"); return user; }
user.balance=user.balance-amt;
user.withdrawRequest=0;
alert("Withdrawal Approved ✅");
}
}
return user;
});
adminLogin();
}

window.logout=function(){location.reload();}
</script>

</body>
</html>
