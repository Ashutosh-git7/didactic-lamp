<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMPL Token Dashboard</title>

<!-- Firebase (ADD YOUR CONFIG BELOW) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(135deg,#0b0f1a,#141b2e);
color:#fff;
}
.container{padding:15px;max-width:900px;margin:auto;}
.card{
background:#1c233a;
padding:15px;
border-radius:12px;
margin:10px 0;
box-shadow:0 0 15px rgba(0,0,0,.5);
}
input,button{
width:100%;
padding:10px;
margin:6px 0;
border:none;
border-radius:8px;
}
input{background:#0f1526;color:#fff;}
button{
background:#00c2ff;
color:#000;
font-weight:bold;
cursor:pointer;
}
h2{text-align:center;}
.hidden{display:none;}
.small{font-size:12px;color:#aaa;}
.flex{display:flex;gap:10px;}
.nav button{flex:1;}
</style>
</head>

<body>
<div class="container">

<!-- REGISTER -->
<div id="registerPage" class="card">
<h2>Register TMPL</h2>
<input id="regName" placeholder="Name">
<input id="regMobile" placeholder="Mobile">
<input id="regWallet" placeholder="BEP20 USDT Wallet">
<button onclick="register()">Register</button>
<div class="small">Already registered? <a href="#" onclick="showLogin()">Login</a></div>
</div>

<!-- LOGIN -->
<div id="loginPage" class="card hidden">
<h2>Login</h2>
<input id="loginMobile" placeholder="Mobile">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<div class="nav flex">
<button onclick="showSection('home')">Dashboard</button>
<button onclick="showSection('team')">Team</button>
<button onclick="logout()">Logout</button>
</div>

<div id="home" class="card">
<h2>TMPL Dashboard</h2>
<div id="stats"></div>

<h3>Join Request</h3>
<input id="joinAmount" placeholder="USDT Amount (Min 20)">
<button onclick="submitJoin()">Submit Joining</button>

<h3>Withdraw</h3>
<input id="withdrawAmount" placeholder="Min 5 USDT">
<button onclick="requestWithdraw()">Request Withdraw</button>

<h3>Referral</h3>
<input id="refLink" readonly>
<button onclick="copyRef()">Copy Link</button>

<h3>Liquidity (Admin Update)</h3>
<input id="liquidityInput" placeholder="Live Liquidity">
<button onclick="updateLiquidity()">Update</button>

</div>

<div id="team" class="card hidden">
<h2>Your Team</h2>
<div id="teamList"></div>
</div>

</div>

<!-- ADMIN PANEL -->
<div id="adminLogin" class="card hidden">
<h2>Admin Login</h2>
<input id="adminId" placeholder="Admin ID">
<input id="adminPass" placeholder="Password">
<button onclick="adminLogin()">Login</button>
</div>

<div id="adminPanel" class="hidden">

<div class="card">
<h2>Admin Panel</h2>
<button onclick="loadUsers()">Load Users</button>
<div id="users"></div>
</div>

<div class="card">
<h3>Withdrawal Requests</h3>
<div id="withdrawRequests"></div>
</div>

</div>

</div>

<script>
/* ---------------- FIREBASE CONFIG ---------------- */
/* PASTE YOUR CONFIG HERE */
var firebaseConfig={
apiKey:"ADD_KEY",
authDomain:"ADD_DOMAIN",
databaseURL:"ADD_DB_URL",
projectId:"ADD_ID"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

/* ---------------- GLOBAL ---------------- */
let currentUser=null;
let isAdmin=false;

/* ---------------- ROUTING ---------------- */
if(location.hash==="#admin"){
document.getElementById("registerPage").classList.add("hidden");
document.getElementById("adminLogin").classList.remove("hidden");
}

function showLogin(){
registerPage.classList.add("hidden");
loginPage.classList.remove("hidden");
}

/* ---------------- REGISTER ---------------- */
function generateRef(){
return Math.random().toString(36).substring(2,6);
}

function getRefFromURL(){
const params=new URLSearchParams(window.location.search);
return params.get("ref")||"";
}

function register(){
let name=regName.value;
let mobile=regMobile.value;
let wallet=regWallet.value;
if(!name||!mobile||!wallet) return alert("Fill all");

let ref=generateRef();
db.ref("users/"+mobile).set({
name,mobile,wallet,
refCode:ref,
upline:getRefFromURL(),
joinTotal:0,
earnings:0,
refEarnings:0
});
alert("Registered");
showLogin();
}

/* ---------------- LOGIN ---------------- */
function login(){
let mobile=loginMobile.value;
db.ref("users/"+mobile).once("value",s=>{
if(!s.exists()) return alert("User not found");
currentUser=s.val();
registerPage.classList.add("hidden");
loginPage.classList.add("hidden");
dashboard.classList.remove("hidden");
loadDashboard();
});
}

/* ---------------- DASHBOARD ---------------- */
function loadDashboard(){
db.ref("users/"+currentUser.mobile).on("value",snap=>{
currentUser=snap.val();
stats.innerHTML=`
<div class="card">
Joining: ${currentUser.joinTotal||0} USDT<br>
TMPL Earnings: ${currentUser.earnings||0}<br>
Referral Earnings: ${currentUser.refEarnings||0}
</div>`;
refLink.value=location.origin+location.pathname+"?ref="+currentUser.refCode;
loadTeam();
});
}

function showSection(id){
home.classList.add("hidden");
team.classList.add("hidden");
document.getElementById(id).classList.remove("hidden");
}

/* ---------------- JOIN ---------------- */
function submitJoin(){
let amt=parseFloat(joinAmount.value);
if(amt<20) return alert("Minimum 20");
let id=Date.now();
db.ref("joins/"+id).set({
user:currentUser.mobile,
amount:amt,
status:"pending"
});
alert("Join submitted");
}

/* ---------------- WITHDRAW ---------------- */
function requestWithdraw(){
let amt=parseFloat(withdrawAmount.value);
if(amt<5) return alert("Minimum 5");
let id=Date.now();
db.ref("withdrawals/"+id).set({
user:currentUser.mobile,
amount:amt,
status:"pending"
});
alert("Requested");
}

/* ---------------- TEAM ---------------- */
function loadTeam(){
teamList.innerHTML="";
db.ref("users").once("value",snap=>{
snap.forEach(c=>{
if(c.val().upline===currentUser.refCode){
teamList.innerHTML+=`<div class="card">${c.val().name}</div>`;
}
});
});
}

/* ---------------- REF COPY ---------------- */
function copyRef(){
navigator.clipboard.writeText(refLink.value);
alert("Copied");
}

/* ---------------- ADMIN ---------------- */
function adminLogin(){
if(adminId.value==="Admin" && adminPass.value==="Jaihanuman@7"){
isAdmin=true;
adminLogin.style.display="none";
adminPanel.classList.remove("hidden");
loadUsers();
loadWithdrawals();
}else alert("Wrong");
}

function loadUsers(){
db.ref("users").once("value",snap=>{
users.innerHTML="";
snap.forEach(c=>{
let u=c.val();
users.innerHTML+=`
<div class="card">
${u.name} (${u.mobile})
<br>Wallet: ${u.wallet}
<br>
<button onclick="approveJoin('${u.mobile}')">Add Earnings</button>
</div>`;
});
});
}

function approveJoin(mobile){
let amt=prompt("Add earnings:");
if(!amt) return;
db.ref("users/"+mobile+"/earnings").transaction(v=>(v||0)+parseFloat(amt));
distributeCommission(mobile,amt);
}

function loadWithdrawals(){
db.ref("withdrawals").on("value",snap=>{
withdrawRequests.innerHTML="";
snap.forEach(c=>{
let w=c.val();
withdrawRequests.innerHTML+=`
<div class="card">
${w.user} - ${w.amount}
<button onclick="approveWithdraw('${c.key}')">Approve</button>
</div>`;
});
});
}

function approveWithdraw(id){
db.ref("withdrawals/"+id+"/status").set("approved");
}

/* ---------------- TOKEN DISPLAY ---------------- */
function updateLiquidity(){
db.ref("stats/liquidity").set(liquidityInput.value);
addLiquidityLog(liquidityInput.value);
}

/* ---------------- AUTOMATION READY FUNCTIONS ---------------- */
function processJoin(joinId){
console.log("Process join:",joinId);
}

function distributeCommission(user,amount){
console.log("Distribute commission",user,amount);
}

function addLiquidityLog(value){
db.ref("liquidityLogs/"+Date.now()).set({value});
}

/* ---------------- LOGOUT ---------------- */
function logout(){
location.reload();
}
</script>
</body>
</html>
